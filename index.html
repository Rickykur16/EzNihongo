function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
}

// ============ CMS DATA (fetched from /api) ============

const CmsContext = React.createContext({ courses: null, sensei: null, testimonials: null, loaded: false });

function CmsProvider({ children }) {
  const [data, setData] = React.useState({ courses: null, sensei: null, testimonials: null, loaded: false });
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const [cRes, sRes, tRes] = await Promise.all([
          fetch('/api/courses').then(r => r.ok ? r.json() : { courses: [] }).catch(() => ({ courses: [] })),
          fetch('/api/sensei').then(r => r.ok ? r.json() : { sensei: [] }).catch(() => ({ sensei: [] })),
          fetch('/api/testimonials').then(r => r.ok ? r.json() : { testimonials: [] }).catch(() => ({ testimonials: [] })),
        ]);
        if (cancelled) return;
        setData({
          courses: cRes.courses || [],
          sensei: sRes.sensei || [],
          testimonials: tRes.testimonials || [],
          loaded: true,
        });
      } catch (e) {
        if (!cancelled) setData({ courses: [], sensei: [], testimonials: [], loaded: true });
      }
    })();
    return () => { cancelled = true; };
  }, []);
  return <CmsContext.Provider value={data}>{children}</CmsContext.Provider>;
}

function PhotoPlaceholder({ caption, aspectRatio = "4/3", tone = "warm", style = {} }) {
  const palettes = {
    warm: { a: "#e8dfd0", b: "#d9cdb8", text: "#5a4a35" },
    cool: { a: "#e0e6ed", b: "#c7d0dc", text: "#3a4656" },
  };
  const p = palettes[tone] || palettes.warm;
  return (
    <div style={{
      aspectRatio,
      background: `repeating-linear-gradient(135deg, ${p.a} 0, ${p.a} 8px, ${p.b} 8px, ${p.b} 16px)`,
      borderRadius: 8,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: p.text,
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 11, letterSpacing: '0.05em',
      padding: 16, textAlign: 'center',
      ...style,
    }}>
      [ {caption} ]
    </div>
  );
}

function ModernSensei() {
  const s = SHARED_CONTENT.sensei;
  const cms = React.useContext(CmsContext);
  // Hide entirely until admin has added sensei — no placeholders on the public page.
  if (!cms.loaded || !cms.sensei || cms.sensei.length === 0) return null;
  const people = cms.sensei.map(x => ({
    name: x.name,
    title: x.title || '',
    bio: x.bio || '',
    tags: Array.isArray(x.tags) ? x.tags : [],
    photoUrl: x.photo_url || null,
  }));
  const [active, setActive] = React.useState(0);
  React.useEffect(() => { if (active >= people.length) setActive(0); }, [people.length]);
  const touchStart = React.useRef(null);
  const mouseStart = React.useRef(null);
  const timer = React.useRef(null);

  const next = () => setActive(a => (a + 1) % people.length);
  const prev = () => setActive(a => (a - 1 + people.length) % people.length);

  const resetTimer = () => {
    clearInterval(timer.current);
    timer.current = setInterval(next, 3500);
  };

  React.useEffect(() => {
    timer.current = setInterval(next, 3500);
    return () => clearInterval(timer.current);
  }, [people.length]);

  const go = (idx) => { setActive(idx); resetTimer(); };

  const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (!touchStart.current) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) { diff > 0 ? next() : prev(); resetTimer(); }
    touchStart.current = null;
  };
  const handleMouseDown = (e) => { mouseStart.current = e.clientX; };
  const handleMouseUp = (e) => {
    if (!mouseStart.current) return;
    const diff = mouseStart.current - e.clientX;
    if (Math.abs(diff) > 40) { diff > 0 ? next() : prev(); resetTimer(); }
    mouseStart.current = null;
  };

  const p = people[active] || people[0] || s.people[0];

  return (
    <section id="sensei" style={{ padding: 'clamp(60px, 10vw, 120px) 0', background: '#fafafa' }}>
      <div className="ez-container">
        <div className="reveal" style={{ textAlign: 'center', marginBottom: 48 }}>
          <div style={{ display: 'inline-block', padding: '5px 12px', background: '#fff0f2', color: '#C8102E', borderRadius: 6, fontSize: 12, fontWeight: 600, letterSpacing: '0.05em', marginBottom: 16 }}>{s.eyebrow.toUpperCase()}</div>
          <h2 style={{ fontSize: 'clamp(26px, 4vw, 48px)', fontWeight: 800, lineHeight: 1.05, letterSpacing: '-0.03em', marginBottom: 12, textWrap: 'balance' }}>{s.title}</h2>
          <p style={{ fontSize: 17, color: '#525252', lineHeight: 1.6 }}>{s.subtitle}</p>
        </div>

        {/* Carousel */}
        <div className="reveal" style={{ maxWidth: 560, margin: '0 auto', cursor: 'grab', userSelect: 'none' }}
          onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
          onMouseDown={handleMouseDown} onMouseUp={handleMouseUp}>

          {/* Card */}
          <div style={{ background: '#fff', borderRadius: 20, overflow: 'hidden', border: '1px solid #e5e5e5', boxShadow: '0 20px 60px rgba(0,0,0,0.07)', transition: 'all 0.4s ease' }}>
            {p.photoUrl
              ? <img src={p.photoUrl} alt={p.name} style={{ width: '100%', aspectRatio: '4/3', objectFit: 'cover', display: 'block' }} />
              : <PhotoPlaceholder caption={`photo: ${p.name.split(' ')[0]}-sensei headshot`} aspectRatio="4/3" tone="warm" style={{ borderRadius: 0 }} />
            }
            <div style={{ padding: 'clamp(20px, 4vw, 32px)' }}>
              <h3 style={{ fontSize: 22, fontWeight: 800, marginBottom: 4, letterSpacing: '-0.02em' }}>{p.name}</h3>
              <div style={{ fontSize: 13, color: '#C8102E', fontWeight: 600, marginBottom: 14 }}>{p.title}</div>
              <p style={{ fontSize: 15, color: '#525252', lineHeight: 1.65, marginBottom: 18 }}>{p.bio}</p>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {p.tags.map(t => (
                  <span key={t} style={{ fontSize: 11, padding: '4px 10px', background: '#f5f5f5', color: '#404040', borderRadius: 6, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{t}</span>
                ))}
              </div>
            </div>
          </div>

          {/* Dots + arrows */}
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 16, marginTop: 24 }}>
            <button onClick={() => { prev(); resetTimer(); }} style={{ width: 36, height: 36, borderRadius: '50%', border: '1.5px solid #e5e5e5', background: '#fff', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s' }}
              onMouseOver={e => { e.currentTarget.style.borderColor = '#C8102E'; e.currentTarget.style.color = '#C8102E'; }}
              onMouseOut={e => { e.currentTarget.style.borderColor = '#e5e5e5'; e.currentTarget.style.color = '#000'; }}>‹</button>

function ModernPricing() {
  const p = SHARED_CONTENT.pricing;
  const cms = React.useContext(CmsContext);
  const plans = (cms.courses && cms.courses.length > 0)
    ? cms.courses.map(c => ({
        name: c.title,
        level: c.level || c.slug?.toUpperCase() || '',
        slug: c.slug,
        price: c.price_label || '',
        period: c.period_label || '',
        tagline: c.tagline || '',
        features: Array.isArray(c.features) ? c.features : [],
        cta: c.cta_label || `Pilih ${c.title}`,
        featured: !!c.is_featured,
        available: c.is_available !== false,
      }))
    : p.plans.map(pl => ({ ...pl, available: true }));
  const defaultIdx = Math.max(0, plans.findIndex(x => x.featured));
  const [active, setActive] = React.useState(defaultIdx >= 0 ? defaultIdx : plans.length - 1);
  React.useEffect(() => { if (active >= plans.length) setActive(0); }, [plans.length]);
  const [animating, setAnimating] = React.useState(false);
  const touchStart = React.useRef(null);

  const switchPlan = (idx) => {
    if (idx === active || animating) return;
    setAnimating(true);
    setTimeout(() => { setActive(idx); setAnimating(false); }, 220);
  };

  const mouseStart = React.useRef(null);

  const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (touchStart.current === null) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 40) return;
    if (diff > 0) switchPlan(Math.min(active + 1, plans.length - 1));
    else switchPlan(Math.max(active - 1, 0));
    touchStart.current = null;
  };

  const handleMouseDown = (e) => { mouseStart.current = e.clientX; };
  const handleMouseUp = (e) => {
    if (mouseStart.current === null) return;
    const diff = mouseStart.current - e.clientX;
    if (Math.abs(diff) < 40) { mouseStart.current = null; return; }
    if (diff > 0) switchPlan(Math.min(active + 1, plans.length - 1));
    else switchPlan(Math.max(active - 1, 0));
    mouseStart.current = null;
  };

  const plan = plans[active] || plans[0];
  if (!plan) return null;

  return (
    <section id="pricing" style={{ padding: 'clamp(60px, 10vw, 120px) 0', background: 'linear-gradient(180deg, #faf7f2 0%, #ffffff 100%)', color: '#0a0a0a' }}>

          <h2 style={{ fontSize: 'clamp(32px, 5vw, 56px)', fontWeight: 800, letterSpacing: '-0.03em', lineHeight: 1.05, color: '#0a0a0a' }}>Daftar &amp; Mulai Sekarang</h2>
        </div>

        {/* Beginner guide */}
        <div className="reveal" style={{ maxWidth: 800, margin: '0 auto 32px', background: '#ffffff', border: '1px solid #e8e0d2', borderRadius: 14, padding: '16px 20px', boxShadow: '0 1px 3px rgba(15, 27, 60, 0.04)' }}>
          <p style={{ fontSize: 13, color: '#8a7d66', marginBottom: 12, fontFamily: "'JetBrains Mono', monospace", letterSpacing: '0.06em' }}>MULAI DARI MANA?</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
            {[
              { label: '🌱 Belum tahu hiragana sama sekali', plan: 'N5', slug: 'n5', color: '#16a34a' },
              { label: '📗 Sudah lulus atau setara N5', plan: 'N4', slug: 'n4', color: '#2563eb' },
              { label: '🎯 Ingin kerja ke Jepang sekarang', plan: 'SSW', slug: 'ssw', color: '#C8102E' },
            ].map((g, i) => {
              const idx = plans.findIndex(x => x.slug === g.slug);
              if (idx < 0) return null;
              g.idx = idx;
              return (
              <button key={i} onClick={() => switchPlan(g.idx)} style={{
                display: 'flex', alignItems: 'center', gap: 8, padding: '9px 16px', borderRadius: 8,
                background: active === g.idx ? `${g.color}12` : '#fafafa',
                border: `1.5px solid ${active === g.idx ? g.color : '#e5e5e5'}`,
                color: active === g.idx ? g.color : '#525252',
                fontSize: 13, fontWeight: 600, cursor: 'pointer', transition: 'all 0.2s',
              }}>
                {g.label}
                <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", opacity: 0.7 }}>→ {g.plan}</span>
              </button>
              );
            })}
          </div>
        </div>

        {/* Tab selector */}
        <div className="reveal" style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 36, flexWrap: 'wrap' }}>
          {plans.map((pl, i) => (
            <button key={i} onClick={() => switchPlan(i)} style={{
              padding: '8px 20px', borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'all 0.2s',
              background: active === i ? '#C8102E' : '#ffffff',
              color: active === i ? '#fff' : '#737373',
              border: active === i ? '1px solid #C8102E' : '1px solid #e5e5e5',
              boxShadow: active === i ? '0 6px 16px rgba(200,16,46,0.22)' : '0 1px 2px rgba(15,27,60,0.04)',
            }}>
              {pl.level}{i === 0 ? ' 👋' : pl.featured ? ' 🔥' : ''}
            </button>
          ))}
        </div>

        {/* Single sliding card */}
        <div className="reveal" style={{ maxWidth: 800, margin: '0 auto', cursor: 'grab' }}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
          onMouseDown={handleMouseDown}

          <div style={{
            background: '#ffffff',
            border: `1px solid ${plan.featured ? 'rgba(200,16,46,0.35)' : '#ececec'}`,

                <div style={{ display: 'inline-block', background: '#fff4e5', color: '#b45309', fontSize: 11, fontWeight: 600, padding: '5px 14px', borderRadius: 999, border: '1px solid #fde68a' }}>⚠️ Disarankan sudah menguasai N4 atau setara</div>
              </div>
            )}
            {!plan.featured && active === 0 && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ display: 'inline-block', background: '#dcfce7', color: '#15803d', fontSize: 11, fontWeight: 700, padding: '5px 14px', borderRadius: 999, border: '1px solid #86efac' }}>🌱 Mulai dari sini jika kamu pemula</div>
              </div>
            )}

            {plan.featured && (

                LPK konvensional: Rp 15.000.000+
              </div>
            )}

            {!plan.available && (
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginBottom: 16, padding: '6px 14px', borderRadius: 999, background: '#fff4e5', border: '1px solid #fde68a', color: '#b45309', fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', fontFamily: "'JetBrains Mono', monospace" }}>

function CinematicSequence({ scenes, badge, badgeTone, progressTone, hook }) {
  const [idx, setIdx] = React.useState(-1);
  const [phase, setPhase] = React.useState('hidden');
  const [hookPhase, setHookPhase] = React.useState('hidden');
  const ref = React.useRef(null);

  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && idx === -1 && hookPhase === 'hidden') {
        if (hook) {
          setHookPhase('enter');
        } else {
          setIdx(0);
          setPhase('enter');
        }
        obs.disconnect();
      }
    }, { threshold: 0.4, rootMargin: '-20% 0px -20% 0px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, [idx, hookPhase, hook]);

  React.useEffect(() => {
    if (hookPhase === 'hidden' || hookPhase === 'done') return;
    if (hookPhase === 'enter') {
      const t = setTimeout(() => setHookPhase('hold'), 900);
      return () => clearTimeout(t);
    }
    if (hookPhase === 'hold') {
      const t = setTimeout(() => setHookPhase('exit'), (hook && hook.duration) || 2200);
      return () => clearTimeout(t);
    }
    if (hookPhase === 'exit') {
      const t = setTimeout(() => {
        setHookPhase('done');
        setIdx(0);
        setPhase('enter');
      }, 600);
      return () => clearTimeout(t);
    }
  }, [hookPhase, hook]);

  React.useEffect(() => {
    if (idx < 0) return;
    const scene = scenes[idx];
    if (phase === 'enter') {
      const t = setTimeout(() => setPhase('hold'), 900);
      return () => clearTimeout(t);
    }
    if (phase === 'hold') {
      if (scene.last) return;
      const t = setTimeout(() => setPhase('exit'), scene.hold || 1400);
      return () => clearTimeout(t);
    }
    if (phase === 'exit') {
      const t = setTimeout(() => {
        setIdx((i) => Math.min(i + 1, scenes.length - 1));
        setPhase('enter');
      }, 700);
      return () => clearTimeout(t);
    }
  }, [idx, phase, scenes]);

  const active = idx >= 0 ? scenes[idx] : null;
  const hookActive = hookPhase !== 'hidden' && hookPhase !== 'done';

  return (
    <div ref={ref} className="ez-cinematic">
      {badge && <div className={`ez-cinematic-badge${badgeTone ? ' tone-' + badgeTone : ''}`}>{badge}</div>}
      <div className="ez-cinematic-stage">
        {hookActive && hook && (
          <div className={`ez-cinematic-hook phase-${hookPhase}${badgeTone === 'warm' ? ' warm' : ''}`}>
            <div className="ez-cinematic-hook-text">{hook.text}</div>
            {hook.sub && <div className="ez-cinematic-hook-sub">{hook.sub}</div>}
            <div className="ez-cinematic-hook-hint">▼</div>
          </div>
        )}
        {active && (
          <div
            key={idx}
            className={`ez-cinematic-scene ${phase}`}
            data-tone={active.tone || 'default'}
          >
            {active.lines.map((l, i) => (
              <div className="ez-cinematic-line" key={i}>{l}</div>
            ))}
          </div>
        )}
      </div>
      <div className={`ez-cinematic-progress${progressTone ? ' tone-' + progressTone : ''}`}>
        {scenes.map((_, i) => (
          <span
            key={i}
            className={`ez-cinematic-dot ${i < idx ? 'done' : i === idx ? 'active' : ''}`}
          />
        ))}
      </div>
    </div>
  );
}
