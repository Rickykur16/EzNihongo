<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lupa Kata Sandi - EzNihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth.css"/>
<style>
  .auth-success {
    display: none;
    background: #e8f5e9;
    border: 1px solid #16a34a44;
    border-radius: 10px;
    padding: 18px;
    text-align: center;
  }
  .auth-success.show { display: block; }
  .auth-success-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #16a34a;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    margin: 0 auto 10px;
  }
  .auth-success h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #166534; margin: 0 0 6px;
  }
  .auth-success p {
    font-size: 13px; color: #2e4e33;
    margin: 0; line-height: 1.5;
  }
  .auth-success strong { color: #166534; }
</style>
</head>
<body>

<main>
  <div style="width:100%;max-width:360px;">

    <div class="auth-header">
      <a href="index.html"><img src="Logo.png" alt="EzNihongo" class="auth-logo"/></a>
      <h1 class="auth-title">Lupa Kata Sandi?</h1>
      <p class="auth-subtitle">Masukkan email kamu. Kami kirim tautan untuk atur ulang kata sandi.</p>
    </div>

    <div class="auth-card">

      <form id="forgot-form" class="auth-form">
        <input id="email" type="email" placeholder="Email terdaftar" required class="auth-input"/>
        <button type="submit" class="auth-submit-btn">Kirim Tautan Reset</button>
      </form>

      <div class="auth-success" id="success-box">
        <div class="auth-success-icon">✓</div>
        <h3>Tautan terkirim!</h3>
        <p>Kami sudah mengirim email ke <strong id="sent-email"></strong>. Cek inbox (atau folder spam) dan klik tautan untuk atur ulang kata sandi.</p>
      </div>

      <p class="auth-footer-text">
        Ingat kata sandi? <a href="login.html" class="auth-link">Masuk</a>
      </p>

    </div>
  </div>
</main>

<footer>
  <p class="footer-text">© 2026 <span class="footer-brand">EzNihongo</span>.</p>
</footer>

<script>
  document.getElementById('forgot-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;

    document.getElementById('sent-email').textContent = email;
    document.getElementById('forgot-form').style.display = 'none';
    document.getElementById('success-box').classList.add('show');

    setTimeout(() => {
      const token = btoa(email + ':' + Date.now()).replace(/=/g, '');
      window.location.href = `reset-password.html?token=${token}`;
    }, 2500);
  });
</script>
</body>
</html>
