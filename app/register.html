<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — EzNihongo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--gray-bg); }

    /* Sembunyikan tombol auth di navbar saat di halaman login/register */
    #nav-auth { display: none; }

    [data-theme="dark"] .auth-card { background: #1E1C19; border-color: #2E2C27; }
    [data-theme="dark"] .form-group input {
      background: #2A2825;
      color: #EDEAE4;
      border-color: #2E2C27;
    }
    [data-theme="dark"] .form-group label { color: #EDEAE4; }
    [data-theme="dark"] .google-btn { background: #2A2825; color: #EDEAE4; border-color: #2E2C27; }
    [data-theme="dark"] .google-btn:hover { background: #333028; }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo a {
      font-size: 22px;
      font-weight: 500;
      color: var(--red);
      text-decoration: none;
    }
    .auth-logo p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--white);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--red); }
    .form-group input::placeholder { color: var(--text-muted); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .password-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 16px 0 20px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .terms input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--red);
      flex-shrink: 0;
    }
    .terms a { color: var(--red); text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: var(--radius-pill);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-bottom: 20px;
    }
    .submit-btn:hover { background: var(--red-dark); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-border);
    }
    .divider span { font-size: 12px; color: var(--text-muted); }

    .google-btn {
      width: 100%;
      padding: 11px;
      background: var(--white);
      color: var(--text-primary);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .google-btn:hover { background: var(--gray-bg); }
    .google-icon { width: 18px; height: 18px; }

    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--red);
      font-weight: 500;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .input-password-wrap {
      position: relative;
    }
    .input-password-wrap input {
      padding-right: 42px;
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }
    .toggle-pw:hover { color: var(--text-secondary); }
    .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html"><img src="logo.png" alt="EzNihongo" style="height:44px;width:auto;"></a>
        <p>Buat akun dan mulai belajar</p>
      </div>

      <button class="google-btn" id="google-btn" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Daftar dengan Google
      </button>

      <div class="auth-footer" style="margin-top:8px;">
        Akun dibuat otomatis saat pertama kali masuk.<br>
        Sudah punya akun? <a href="login.html">Masuk di sini</a>
      </div>

    </div>
  </div>

  <script src="analytics.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="nav.js"></script>
  <script>
    async function loginWithGoogle() {
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.style.opacity = '0.7';
      await _supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/auth-callback.html' }
      });
    }
  </script>

</body>
</html>
