<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — EzNihongo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background: var(--gray-bg); }

    /* Sembunyikan tombol auth di navbar saat di halaman login/register */
    #nav-auth { display: none; }

    [data-theme="dark"] .auth-card { background: #1E1C19; border-color: #2E2C27; }
    [data-theme="dark"] .form-group input {
      background: #2A2825;
      color: #EDEAE4;
      border-color: #2E2C27;
    }
    [data-theme="dark"] .form-group label { color: #EDEAE4; }
    [data-theme="dark"] .google-btn { background: #2A2825; color: #EDEAE4; border-color: #2E2C27; }
    [data-theme="dark"] .google-btn:hover { background: #333028; }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo a {
      font-size: 22px;
      font-weight: 500;
      color: var(--red);
      text-decoration: none;
    }
    .auth-logo p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--white);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--red); }
    .form-group input::placeholder { color: var(--text-muted); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .password-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 16px 0 20px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .terms input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--red);
      flex-shrink: 0;
    }
    .terms a { color: var(--red); text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: var(--radius-pill);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-bottom: 20px;
    }
    .submit-btn:hover { background: var(--red-dark); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-border);
    }
    .divider span { font-size: 12px; color: var(--text-muted); }

    .google-btn {
      width: 100%;
      padding: 11px;
      background: var(--white);
      color: var(--text-primary);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .google-btn:hover { background: var(--gray-bg); }
    .google-icon { width: 18px; height: 18px; }

    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--red);
      font-weight: 500;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .input-password-wrap {
      position: relative;
    }
    .input-password-wrap input {
      padding-right: 42px;
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }
    .toggle-pw:hover { color: var(--text-secondary); }
    .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html"><img src="logo.png" alt="EzNihongo" style="height:44px;width:auto;"></a>
        <p>Buat akun Kanji dan mulai belajar</p>
      </div>

      <!-- Google Identity Services button renders here -->
      <div id="google-btn-container" style="display:flex;justify-content:center;margin-bottom:8px;"></div>
      <p id="signin-status" style="font-size:13px;color:var(--text-secondary);text-align:center;margin:12px 0 0;"></p>

      <div id="error-banner" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px 12px;border-radius:var(--radius-sm);margin-top:12px;font-size:13px;text-align:center;"></div>

      <div id="step-profile" style="display:none;margin-top:20px;">
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;text-align:center;">
          Masukkan nama tampilan untuk akun Kanji kamu:
        </p>
        <form id="profile-form">
          <div class="form-group">
            <input id="full-name" type="text" placeholder="Nama lengkap" required maxlength="100" />
          </div>
          <button type="submit" class="submit-btn">Lanjutkan</button>
          <button type="button" id="cancel-profile" style="width:100%;background:none;border:none;color:var(--text-secondary);font-size:13px;cursor:pointer;padding:6px;font-family:inherit;">Pakai akun Google lain</button>
        </form>
      </div>

      <div class="auth-footer" style="margin-top:8px;">
        Akun Kanji terpisah dari akun utama eznihongo.com.<br>
        Sudah punya akun? <a href="login.html">Masuk di sini</a>
      </div>

    </div>
  </div>

  <script src="analytics.js"></script>
  <script src="api-client.js"></script>
  <script src="nav.js"></script>
  <script>
    const GOOGLE_CLIENT_ID = '998431349663-20kog1i9aeln8d7c21r8bi1ha084078o.apps.googleusercontent.com';

    function getRedirect() {
      const p = new URLSearchParams(location.search);
      const raw = p.get('redirect');
      const dec = raw ? decodeURIComponent(raw) : 'kanji.html';
      if (/^https?:|^\/\//.test(dec)) return 'kanji.html';
      return dec;
    }
    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg; el.style.display = 'block';
    }
    function clearError() { document.getElementById('error-banner').style.display = 'none'; }

    (async () => {
      const user = await ezGetMe();
      if (user) location.replace(getRedirect());
    })();

    function readGoogleName(credential) {
      try {
        const payload = JSON.parse(atob(credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        return payload.name || '';
      } catch { return ''; }
    }

    let _pendingCredential = null;

    function handleGoogleCredential(response) {
      clearError();
      _pendingCredential = response.credential;
      document.getElementById('signin-status').textContent = '';
      document.getElementById('google-btn-container').style.display = 'none';
      document.getElementById('step-profile').style.display = 'block';
      const nameInput = document.getElementById('full-name');
      nameInput.value = readGoogleName(response.credential);
      setTimeout(() => { nameInput.focus(); nameInput.select(); }, 50);
    }

    document.getElementById('cancel-profile').addEventListener('click', () => {
      _pendingCredential = null;
      document.getElementById('step-profile').style.display = 'none';
      document.getElementById('google-btn-container').style.display = 'flex';
      clearError();
    });

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const fullName = document.getElementById('full-name').value.trim();
      if (!fullName) { showError('Nama harus diisi.'); return; }
      if (!_pendingCredential) { showError('Sesi Google tidak ditemukan. Coba lagi.'); return; }
      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true; btn.textContent = 'Menyimpan...';
      try {
        await ezLoginWithGoogle(_pendingCredential, fullName);
        try {
          sessionStorage.setItem('ez_just_logged_in', '1');
          sessionStorage.setItem('ez_login_name', fullName.split(/\s+/)[0] || '');
        } catch {}
        location.replace(getRedirect());
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Lanjutkan';
        showError('Gagal daftar: ' + (err.message || 'coba lagi'));
      }
    });

    window.addEventListener('load', () => {
      const tryInit = () => {
        if (!window.google || !window.google.accounts) { setTimeout(tryInit, 100); return; }
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleCredential,
          auto_select: false,
          ux_mode: 'popup',
        });
        google.accounts.id.renderButton(
          document.getElementById('google-btn-container'),
          { type: 'standard', theme: 'outline', size: 'large', text: 'signup_with', shape: 'rectangular', logo_alignment: 'left', width: 320 }
        );
      };
      tryInit();
    });
  </script>

</body>
</html>
