<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memuat... · EzNihongo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--gray-bg); display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .loading-box { display:flex; flex-direction:column; align-items:center; gap:14px; }
    .loading-box img { height:40px; }
    .spinner { width:28px; height:28px; border:3px solid var(--gray-border); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading-box">
    <img src="logo.png" alt="EzNihongo" />
    <div class="spinner"></div>
    <p id="status" style="font-size:14px;color:var(--text-secondary);">Memeriksa sesi...</p>
  </div>

  <script src="api-client.js"></script>
  <script>
    // GIS popup login is inline now (see login.html) — no OAuth redirect here.
    // This page exists only as a compatibility stub for old bookmarks: check
    // session, route to kanji.html if logged in, else back to login.
    (async () => {
      try {
        const user = typeof window.ezGetMe === 'function' ? await window.ezGetMe() : null;
        if (user) {
          try {
            sessionStorage.setItem('ez_just_logged_in', '1');
            const first = (user.fullName || user.email || '').toString().trim().split(/\s+/)[0];
            if (first) sessionStorage.setItem('ez_login_name', first);
          } catch {}
          location.replace('kanji.html');
        } else {
          location.replace('login.html');
        }
      } catch {
        location.replace('login.html');
      }
    })();
  </script>
</body>
</html>
