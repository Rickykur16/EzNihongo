<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memuat... · EzNihongo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .loading-box { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .loading-box img { height: 40px; }
    .loading-box p { font-size: 14px; color: var(--text-secondary); }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--gray-border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading-box">
    <img src="logo.png" alt="EzNihongo" />
    <div class="spinner"></div>
    <p id="status">Memverifikasi akun...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://bawgehtwhxhydgoztbhp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_4mDzwW_QNliMylit68ESxA_kld_aW_S';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function setStatus(msg) { document.getElementById('status').textContent = msg; }

    let redirected = false;

    // Cek session langsung (untuk user yang koneksinya cepat)
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session && !redirected) {
        redirected = true;
        setStatus('Masuk...');
        location.href = 'index.html';
      }
    });

    // Tunggu event SIGNED_IN (untuk user yang koneksinya lambat)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session && !redirected) {
        redirected = true;
        setStatus('Masuk...');
        location.href = 'index.html';
      }
      if (event === 'SIGNED_OUT') {
        setStatus('Gagal masuk. Mengalihkan...');
        setTimeout(() => location.href = 'login.html', 2000);
      }
    });
  </script>
</body>
</html>
