<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - EzNihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth.css"/>
</head>
<body>

<main>
  <div style="width:100%;max-width:360px;">

    <!-- Header -->
    <div class="auth-header">
      <a href="index.html"><img src="Logo.png" alt="EzNihongo" class="auth-logo"/></a>
      <h1 class="auth-title">Masuk</h1>
      <p class="auth-subtitle">Selamat datang kembali! Lanjutkan belajar bahasa Jepangmu.</p>
    </div>

    <!-- Reset success banner -->
    <div id="reset-banner" style="display:none;background:#e8f5e9;border:1px solid #16a34a44;color:#166534;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:500;text-align:center;">
      ✓ Kata sandi berhasil diubah. Silakan masuk dengan kata sandi baru.
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Google -->
      <button type="button" class="google-btn" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Masuk dengan Google
      </button>

      <!-- Divider -->
      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">atau</span>
        <div class="auth-divider-line"></div>
      </div>

      <!-- Form -->
      <form id="login-form" class="auth-form">
        <input id="email" type="email" placeholder="Email" required class="auth-input"/>
        <input id="password" type="password" placeholder="Kata sandi" required class="auth-input"/>
        <div class="forgot-link">
          <a href="forgot-password.html">Lupa kata sandi?</a>
        </div>
        <button type="submit" class="auth-submit-btn">Masuk</button>
      </form>

      <!-- Register link -->
      <p class="auth-footer-text">
        Belum punya akun? <a href="register.html" class="auth-link">Daftar</a>
      </p>

    </div>
  </div>
</main>

<footer>
  <p class="footer-text">© 2026 <span class="footer-brand">EzNihongo</span>.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('reset') === '1') {
    document.getElementById('reset-banner').style.display = 'block';
  }

  function getNextUrl() {
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next');
    return next ? decodeURIComponent(next) : 'welcome.html';
  }

  // If already signed in, skip login page
  (async () => {
    const sb = await ensureSupabase();
    const { data: { session } } = await sb.auth.getSession();
    if (session) { mirrorSessionToLocal(session); location.replace(getNextUrl()); }
  })();

  async function loginWithGoogle() {
    const btn = document.querySelector('.google-btn');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.7'; }
    await ezLoginWithGoogle(getNextUrl());
  }

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const submitBtn = e.target.querySelector('.auth-submit-btn');
    submitBtn.disabled = true; submitBtn.textContent = 'Masuk...';
    const sb = await ensureSupabase();
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      submitBtn.disabled = false; submitBtn.textContent = 'Masuk';
      alert(error.message || 'Gagal masuk. Periksa email dan kata sandi.');
      return;
    }
    mirrorSessionToLocal(data.session);
    location.href = getNextUrl();
  });
</script>
</body>
</html>
