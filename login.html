<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Masuk - EzNihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth.css"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<main>
  <div style="width:100%;max-width:360px;">

    <!-- Header -->
    <div class="auth-header">
      <a href="index.html"><img src="logo.png" alt="EzNihongo" class="auth-logo"/></a>
      <h1 class="auth-title" id="title">Masuk atau Daftar</h1>
      <p class="auth-subtitle" id="subtitle">Gunakan akun Google untuk lanjutkan belajar bahasa Jepang.</p>
    </div>

    <!-- Error banner -->
    <div id="error-banner" style="display:none;background:#fef2f2;border:1px solid #ef444455;color:#991b1b;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:500;text-align:center;"></div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Sign-in step -->
      <div id="step-signin">
        <div id="google-btn-container" style="display:flex;justify-content:center;margin-bottom:8px;"></div>
        <p id="signin-status" style="font-family:'Manrope',sans-serif;font-size:13px;color:#737373;text-align:center;margin:12px 0 0;"></p>
      </div>

      <!-- Profile-complete step (first signup) -->
      <div id="step-profile" style="display:none;">
        <p class="auth-subtitle" style="margin-bottom:16px;text-align:center;">
          Akun baru terdeteksi. Masukkan nama tampilan kamu:
        </p>
        <form id="profile-form" class="auth-form">
          <input id="full-name" type="text" placeholder="Nama lengkap" required maxlength="100" class="auth-input"/>
          <button type="submit" class="auth-submit-btn">Lanjutkan</button>
        </form>
      </div>

    </div>
  </div>
</main>

<footer>
  <p class="footer-text">© 2026 <span class="footer-brand">EzNihongo</span>.</p>
</footer>

<script src="api-client.js"></script>
<script>
  const GOOGLE_CLIENT_ID = '998431349663-20kog1i9aeln8d7c21r8bi1ha084078o.apps.googleusercontent.com';

  function getNextUrl() {
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next');
    const decoded = next ? decodeURIComponent(next) : 'welcome.html';
    // Guard against open redirect — only allow relative paths
    if (/^https?:|^\/\//.test(decoded)) return 'welcome.html';
    return decoded;
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() {
    document.getElementById('error-banner').style.display = 'none';
  }

  // ── If already signed in, skip page ──
  (async () => {
    const user = await ezGetMe();
    if (user) location.replace(getNextUrl());
  })();

  // ── Google Identity Services callback ──
  let _pendingCredential = null;
  let _pendingGoogleName = '';

  async function handleGoogleCredential(response) {
    clearError();
    const credential = response.credential;
    document.getElementById('signin-status').textContent = 'Memverifikasi akun...';
    try {
      await ezLoginWithGoogle(credential);
      location.replace(getNextUrl());
    } catch (err) {
      if (err.code === 'profile_required') {
        _pendingCredential = credential;
        _pendingGoogleName = err.googleName || '';
        document.getElementById('step-signin').style.display = 'none';
        document.getElementById('step-profile').style.display = 'block';
        document.getElementById('title').textContent = 'Lengkapi Profil';
        document.getElementById('subtitle').textContent = 'Terakhir, pilih nama tampilan yang mau muncul di EzNihongo.';
        if (_pendingGoogleName) {
          document.getElementById('full-name').value = _pendingGoogleName;
        }
        setTimeout(() => document.getElementById('full-name').focus(), 50);
      } else {
        document.getElementById('signin-status').textContent = '';
        showError('Gagal masuk: ' + (err.message || 'coba lagi'));
      }
    }
  }

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const fullName = document.getElementById('full-name').value.trim();
    if (!fullName) { showError('Nama harus diisi.'); return; }
    const btn = e.target.querySelector('.auth-submit-btn');
    btn.disabled = true; btn.textContent = 'Menyimpan...';
    try {
      await ezLoginWithGoogle(_pendingCredential, fullName);
      location.replace(getNextUrl());
    } catch (err) {
      btn.disabled = false; btn.textContent = 'Lanjutkan';
      showError('Gagal simpan profil: ' + (err.message || 'coba lagi'));
    }
  });

  // ── Mount Google button once GSI loads ──
  window.addEventListener('load', () => {
    const tryInit = () => {
      if (!window.google || !window.google.accounts) {
        setTimeout(tryInit, 100);
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
        auto_select: false,
        ux_mode: 'popup',
      });
      google.accounts.id.renderButton(
        document.getElementById('google-btn-container'),
        { type: 'standard', theme: 'outline', size: 'large', text: 'continue_with', shape: 'rectangular', logo_alignment: 'left', width: 320 }
      );
    };
    tryInit();
  });
</script>
</body>
</html>
