// User-controlled tip index. Null = auto (derived from lesson idx).
let currentTipIndex = null;
// Track last lesson shown — lesson changes reset auto-tip rotation.
let _tipLessonSignature = null;

window.cycleTip = () => {
  const active = currentTipIndex ?? 0;
  currentTipIndex = (active + 1) % PRO_TIPS.length;
  renderRightPanel();
};

function renderRightPanel() {
  const panel = document.getElementById('right-panel');
  if (!panel) return;
  const course = COURSE_CONTENT[currentState.course];
  const module = course.modules.find(m => m.id === currentState.moduleId);
  const lesson = module?.lessons.find(l => l.id === currentState.lessonId);
  if (!module || !lesson) { panel.innerHTML = ''; return; }

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === module.id && x.l.id === lesson.id);
  const next = allLessons[idx + 1];
  const progress = getProgress()[currentState.course] || {};
  const totalLessons = allLessons.length;
  const doneLessons = Object.values(progress).filter(v => v).length;
  const pct = Math.round((doneLessons / totalLessons) * 100);
  const TYPE_LABEL = { video: 'Video', quiz: 'Kuis', text: 'Bacaan' };

  // Tip selection: if user hasn't clicked yet for this lesson, default
  // to lesson-indexed tip (varies naturally as they navigate). If they
  // clicked cycleTip(), respect their choice until lesson changes.
  const sig = `${module.id}:${lesson.id}`;
  if (sig !== _tipLessonSignature) {
    currentTipIndex = null;
    _tipLessonSignature = sig;
  }
  const tipIdx = currentTipIndex ?? (idx % PRO_TIPS.length);
  const tip = PRO_TIPS[tipIdx];
  const dotsHtml = PRO_TIPS.map((_, i) =>
    `<span class="rp-tip-dot ${i === tipIdx ? 'active' : ''}"></span>`
  ).join('');

  const nextBlock = next ? `
    <div class="rp-card rp-next">
      <div class="rp-eyebrow">Selanjutnya</div>
      <div class="rp-next-title">${next.l.title}</div>
      <div class="rp-next-meta">
        <span class="lesson-type-badge badge-${(next.l.type||'text')}">${TYPE_LABEL[next.l.type] || 'Materi'}</span>
        <span class="rp-dot">·</span>
        <span>${next.l.duration || ''}</span>
      </div>
      <button class="rp-next-btn" onclick="selectLesson('${next.m.id}','${next.l.id}')">Pratinjau →</button>
    </div>
  ` : `
    <div class="rp-card rp-next rp-done">
      <div class="rp-eyebrow">Selesai</div>
      <div class="rp-next-title">🎌 Ini bab terakhir</div>
      <div class="rp-next-meta"><span>Lanjut ke flashcard review</span></div>
    </div>
  `;

  panel.innerHTML = `
    <div class="rp-card rp-progress">
      <div class="rp-eyebrow">Progress Keseluruhan</div>
      <div class="rp-progress-top">
        <div class="rp-progress-num">${pct}<span>%</span></div>
        <div class="rp-progress-sub">${doneLessons} dari ${totalLessons} materi</div>
      </div>
      <div class="rp-progress-bar"><div class="rp-progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${nextBlock}
    <div class="rp-card rp-tip" onclick="cycleTip()" role="button" tabindex="0"
         aria-label="Klik untuk tip berikutnya"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();cycleTip()}">
      <div class="rp-tip-head">
        <div class="rp-eyebrow">💡 Pro Tip</div>
        <span class="rp-tip-hint" aria-hidden="true">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>

      <div class="rp-tip-body" data-tip-idx="${tipIdx}">

window.filterModules = (value) => {

  const modules = document.querySelectorAll('#sidebar .modules-list .module');

  modules.forEach((el) => {

  if (empty) empty.style.display = (q && visible === 0) ? '' : 'none';

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderModuleIntro(module) {
  const hasCando = Array.isArray(module.candoStatements) && module.candoStatements.length > 0;
  const hasScenario = !!(module.scenario && module.scenario.trim());
  if (!hasCando && !hasScenario && !module.cefrLevel && !module.estimatedHours && !module.jfTopic && !module.titleEn) {
    return '';
  }

  const pills = [];
  if (module.cefrLevel) pills.push(`<span class="pill pill-accent">CEFR ${escapeHtml(module.cefrLevel)}</span>`);
  if (module.estimatedHours) pills.push(`<span class="pill">⏱ ${escapeHtml(module.estimatedHours)} jam</span>`);
  if (module.jfTopic) pills.push(`<span class="pill">${escapeHtml(module.jfTopic)}</span>`);

  return `
    <div class="module-intro">
      <div class="module-intro-eyebrow">Modul ${escapeHtml(module.num)}</div>
      <h2>${escapeHtml(module.title)}</h2>
      ${module.titleEn ? `<p class="module-intro-sub">${escapeHtml(module.titleEn)}</p>` : ''}
      ${pills.length ? `<div class="module-intro-meta">${pills.join('')}</div>` : ''}
      ${hasCando ? `
        <div class="module-intro-section-title">Setelah modul ini kamu akan bisa:</div>
        <ul class="cando-list">
          ${module.candoStatements.map((c) => `<li>${escapeHtml(c)}</li>`).join('')}

      ${hasScenario ? `
        <div class="module-intro-section-title">Skenario</div>
        <div class="scenario-box">${escapeHtml(module.scenario)}</div>

  `;
}

// ═══════════════════════════════════════════════
// VOCAB FLASHCARD — FSRS v5 session
// Adapted from legacy Nihonggo learn app (kanji.html).
// Queue-based: rating 1 (Lupa) pushes card back to queue;
// rating 2-4 writes FSRS schedule + marks card done.
// ═══════════════════════════════════════════════
const VFC = {
  queue: [],
  total: 0,
  done: 0,
  lupaSet: new Set(),
  tally: { 1: 0, 2: 0, 3: 0, 4: 0 },
  lessonId: null,
  flipped: false,
};

function vfcCardId(v, lessonId) {
  // Prefix with lesson so the same vocab shared across lessons (rare but
  // possible) schedules independently per context.
  return 'v:' + lessonId + ':' + (v.id || (v.japanese + '|' + (v.reading || '')));
}

function vfcPreviewIntervals(v) {
  const id = vfcCardId(v, VFC.lessonId);
  const card = (window.EzFSRS && EzFSRS.getCardState(id)) || null;
  const fmt = (days) => {
    if (days == null) return '—';
    if (days < 1) return '<1h';
    if (days < 30) return days + 'h';
    if (days < 365) return Math.round(days / 30) + 'bl';
    return Math.round(days / 365) + 'th';
  };
  const w = EzFSRS.getWeights();
  const intervals = {};
  [1, 2, 3, 4].forEach((r) => {
    try {
      const sim = EzFSRS._internals.calculateNextState(card || EzFSRS._internals.makeNewCard(), r, w, 0.9);
      const days = Math.max(0, Math.round((sim.due - Date.now()) / 86400000));
      intervals[r] = fmt(days);
    } catch (e) { intervals[r] = '—'; }
  });
  return intervals;
}

function openVocabFlashcard() {
  const course = COURSE_CONTENT[currentState.course];
  if (!course) { showToast('Data kursus belum siap', 2000); return; }
  const mod = (course.modules || []).find((m) => m.id === currentState.moduleId);
  const lesson = mod && (mod.lessons || []).find((l) => l.id === currentState.lessonId);
  if (!lesson) { showToast('Pelajaran tidak ditemukan', 2000); return; }
  const lessonId = lesson.id;

  const vocab = Array.isArray(lesson.vocabulary) ? lesson.vocabulary.slice() : [];
  vocab.sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));

  const overlay = document.getElementById('vfc-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Reset view state
  document.getElementById('vfc-done').style.display = 'none';
  document.getElementById('vfc-ratings').style.display = 'none';
  document.getElementById('vfc-empty').style.display = 'none';
  document.getElementById('vfc-body').style.display = 'flex';

  if (vocab.length === 0) {
    document.getElementById('vfc-body').style.display = 'none';
    document.getElementById('vfc-empty').style.display = 'block';
    document.getElementById('vfc-title').textContent = lesson.title || 'Kosakata';
    document.getElementById('vfc-counter').textContent = '0 / 0';
    document.getElementById('vfc-pbar').style.width = '0%';
    return;
  }

  VFC.lessonId = lessonId;
  VFC.queue = vocab;
  VFC.total = vocab.length;
  VFC.done = 0;
  VFC.lupaSet = new Set();
  VFC.tally = { 1: 0, 2: 0, 3: 0, 4: 0 };
  VFC.flipped = false;
  document.getElementById('vfc-title').textContent = lesson.title || 'Kosakata';
  renderVocabCard();
}

function closeVocabFlashcard() {
  const overlay = document.getElementById('vfc-overlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

function renderVocabCard() {
  const v = VFC.queue[0];
  if (!v) return;
  VFC.flipped = false;
  document.getElementById('vfc-card').classList.remove('flipped');
  document.getElementById('vfc-ratings').style.display = 'none';

  // Header
  const lupaInfo = VFC.lupaSet.size > 0 ? ` · 🔁${VFC.lupaSet.size}` : '';
  document.getElementById('vfc-counter').textContent = `${VFC.done}/${VFC.total}${lupaInfo}`;
  const pct = VFC.total ? Math.round((VFC.done / VFC.total) * 100) : 0;
  document.getElementById('vfc-pbar').style.width = pct + '%';

  // Front
  document.getElementById('vfc-front-jp').textContent = v.japanese || '—';

  // Back
  document.getElementById('vfc-back-jp').textContent = v.japanese || '—';
  document.getElementById('vfc-back-read').textContent = v.reading || '';
  document.getElementById('vfc-back-mean').textContent = v.indonesian || '—';
  const catWrap = document.getElementById('vfc-back-cat-wrap');
  catWrap.innerHTML = v.category ? `<span class="vfc-back-cat">${escapeHtml(v.category)}</span>` : '';
  const noteEl = document.getElementById('vfc-back-note');
  if (v.note) {
    noteEl.textContent = v.note;
    noteEl.style.display = '';
  } else {
    noteEl.style.display = 'none';
  }

  // Interval previews
  const iv = vfcPreviewIntervals(v);
  for (let r = 1; r <= 4; r++) {
    const el = document.getElementById('vfc-int-' + r);
    if (el) el.textContent = iv[r];
  }
}

function flipVocabCard() {
  if (VFC.flipped) return;
  VFC.flipped = true;
  document.getElementById('vfc-card').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('vfc-ratings').style.display = '';
  }, 230);
}

function vfcShowDone() {
  document.getElementById('vfc-body').style.display = 'none';
  document.getElementById('vfc-ratings').style.display = 'none';
  document.getElementById('vfc-done').style.display = 'flex';
  const hafal = VFC.tally[2] + VFC.tally[3] + VFC.tally[4];
  document.getElementById('vfc-done-sub').textContent =
    `${VFC.total} kartu · ${hafal} hafal · ${VFC.tally[1]} perlu diulang`;
  const labels = { 1: 'Lupa', 2: 'Susah', 3: 'Bisa', 4: 'Mudah' };
  const colors = { 1: '#991B1B', 2: '#92400E', 3: '#065F46', 4: '#1E40AF' };
  document.getElementById('vfc-done-grid').innerHTML =
    [1, 2, 3, 4].map((r) => `
      <div class="vfc-done-stat">
        <div class="vfc-done-stat-num" style="color:${colors[r]}">${VFC.tally[r]}</div>
        <div class="vfc-done-stat-lbl">${labels[r]}</div>
      </div>`).join('');
}

function vfcRate(rating) {
  const v = VFC.queue[0];
  if (!v) return;
  VFC.tally[rating]++;
  if (rating >= 2) {
    // Commit to FSRS + move on
    try { EzFSRS.reviewCard(vfcCardId(v, VFC.lessonId), rating); } catch (e) {}
    VFC.lupaSet.delete(v.id || v.japanese);
    VFC.done++;
    VFC.queue.shift();
  } else {
    // Lupa — push to end of queue, review again later in session
    VFC.lupaSet.add(v.id || v.japanese);
    VFC.queue.push(VFC.queue.shift());
  }
  if (VFC.queue.length === 0) { vfcShowDone(); return; }
  renderVocabCard();
}

// Wire up flashcard UI once at load
(function wireVfc() {
  const overlay = document.getElementById('vfc-overlay');
  if (!overlay) return;
  const card = document.getElementById('vfc-card');
  card.addEventListener('click', flipVocabCard);
  document.getElementById('vfc-back').addEventListener('click', closeVocabFlashcard);
  document.getElementById('vfc-done-btn').addEventListener('click', closeVocabFlashcard);
  // Close on overlay click (but not when clicking the shell itself)
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeVocabFlashcard(); });
  // ESC to close
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeVocabFlashcard();
  });
  overlay.querySelectorAll('.vfc-rbtn').forEach((btn) => {
    btn.addEventListener('click', () => vfcRate(parseInt(btn.dataset.rating, 10)));
  });
})();

window.openVocabFlashcard = openVocabFlashcard;

function renderLessonGrammar(lesson) {
  const rows = Array.isArray(lesson.grammar) ? lesson.grammar : [];
  if (rows.length === 0) return '';
  const sorted = rows.slice().sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
  return `
    <div class="lesson-extra-card">
      <h3>📖 Grammar di pelajaran ini (${sorted.length})</h3>
      <div class="grammar-list">
        ${sorted.map((g) => `
          <div class="grammar-card">
            <div class="grammar-pattern">${escapeHtml(g.pattern || '')}</div>
            ${g.meaning ? `<div class="grammar-meaning">${escapeHtml(g.meaning)}</div>` : ''}
            ${g.example ? `<div class="grammar-example">${escapeHtml(g.example)}</div>` : ''}
            ${g.notes ? `<div class="grammar-notes">${escapeHtml(g.notes)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderLessonExtras(lesson) {
  const vocab = renderLessonVocab(lesson);
  const grammar = renderLessonGrammar(lesson);
  if (!vocab && !grammar) return '';
  return `<div class="lesson-extras">${vocab}${grammar}</div>`;
}

function renderLesson() {
  const course = COURSE_CONTENT[currentState.course];
  const module = course.modules.find(m => m.id === currentState.moduleId);
  const lesson = module.lessons.find(l => l.id === currentState.lessonId);
  const progress = getProgress()[currentState.course] || {};
  const key = `${module.id}:${lesson.id}`;
  const isDone = !!progress[key];

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === module.id && x.l.id === lesson.id);
  const prev = allLessons[idx - 1];
  const next = allLessons[idx + 1];

  // Handle interactive quiz
  if (lesson.type === 'quiz') {
    const quizKey = getQuizKey(currentState.course, module.id, lesson.id);
    const scores = JSON.parse(localStorage.getItem('ez_quiz_scores') || '{}');
    const bestScore = scores[quizKey] || 0;

    document.getElementById('main-content').innerHTML = `
      <p class="lesson-breadcrumb">${course.name} · Modul <span>${module.num}</span> · KUIS</p>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${module.title} — ${lesson.duration}</p>

      <div class="quiz-container">
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:48px;margin-bottom:12px;">📝</div>
          <h2 style="font-size:22px;font-weight:800;margin:0 0 8px;">Siap untuk kuis?</h2>
          <p style="color:#485f84;margin:0 0 20px;">${lesson.body || 'Tes pemahaman kamu di bab ini.'}</p>
          ${bestScore > 0 ? `<div style="display:inline-block;padding:8px 18px;background:#fff0f2;color:#b20024;border-radius:999px;font-weight:700;font-size:13px;margin-bottom:20px;">Skor terbaik: ${bestScore}%</div><br/>` : ''}
          <button class="btn-primary" id="quiz-start-btn" onclick="window.startQuizNow()">
            ${bestScore > 0 ? 'Ulang Kuis →' : 'Mulai Kuis →'}
          </button>
        </div>
      </div>

      <div class="lesson-footer" style="margin-top:20px;">
        <button class="btn-secondary" ${!prev ? 'disabled' : ''} onclick="${prev ? `selectLesson('${prev.m.id}','${prev.l.id}')` : ''}">
          ← Sebelumnya
        </button>
      </div>
    `;
    return;
  }

  // Regular lesson (video/text) — only render the player for actual video lessons.
  // The placeholder signals that a video will live here; click action stays a
  // friendly "coming soon" until Bunny Stream playback is wired up.
  const videoBlock = lesson.type === 'video' ? `
    <div class="video-player">
      <span class="video-soon">Segera tersedia</span>
      <button class="play-btn" onclick="alert('Video pelajaran akan segera tersedia di sini.')">▶</button>
      <span class="video-meta">${lesson.type.toUpperCase()} · ${lesson.duration.toUpperCase()}</span>
    </div>
  ` : '';

  // Show module intro panel only on the first lesson of a module (orientation).
  const isFirstOfModule = module.lessons[0]?.id === lesson.id;
  const introBlock = isFirstOfModule ? renderModuleIntro(module) : '';

  // When the intro panel is rendered, the first lesson's body duplicates the
  // same info (importer-generated markdown). Skip the body block to avoid
  // showing both.
  const bodyBlock = introBlock ? '' : `
    <div class="lesson-body">
      <h2>Catatan Pelajaran ${lesson.jp ? `<button class="pronounce-btn" style="vertical-align:middle;font-size:11px;" onclick="window.speakLessonJP(this)">🔊 Putar Jepang</button>` : ''}</h2>
      <p>${lesson.body}</p>
      ${lesson.jp ? `<div class="jp" id="lesson-jp">${lesson.jp}</div>` : ''}
      <p style="color:#999;font-size:13px;margin-top:18px;">Materi lengkap: video tutorial, contoh audio, dan worksheet PDF tersedia saat belajar.</p>
    </div>
  `;

  document.getElementById('main-content').innerHTML = `
    <p class="lesson-breadcrumb">${course.name} · Modul <span>${module.num}</span> · ${lesson.type.toUpperCase()}</p>
    <h1 class="lesson-title">${lesson.title}</h1>
    <p class="lesson-subtitle">${module.title} — ${lesson.duration}</p>

    ${introBlock}

    ${videoBlock}

    ${bodyBlock}

    ${renderLessonExtras(lesson)}

    ${renderLessonTabs(module, lesson)}

    <div class="lesson-footer">
      <button class="btn-secondary" ${!prev ? 'disabled' : ''} onclick="${prev ? `selectLesson('${prev.m.id}','${prev.l.id}')` : ''}">
        ← Sebelumnya
      </button>
      <button class="btn-primary" onclick="markCompleteAndNext()">
        ${isDone ? (next ? 'Lanjut →' : 'Selesai ✓') : (next ? 'Tandai Selesai & Lanjut →' : 'Tandai Selesai ✓')}
      </button>
    </div>
  `;
}

window.switchLessonTab = (tab) => {
  document.querySelectorAll('#lesson-tabs .tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('#lesson-tabs .tab-pane').forEach(p => {
    p.classList.toggle('active', p.dataset.pane === tab);
  });
};

let _noteSaveTimer = null;
window.saveLessonNote = (key, value) => {
  const status = document.getElementById('note-status');
  if (status) { status.textContent = 'Menyimpan...'; status.classList.add('saving'); }
  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(() => {
    try { localStorage.setItem(key, value); } catch(e) {}
    if (status) { status.textContent = 'Tersimpan ✓'; status.classList.remove('saving'); status.classList.add('saved'); }
  }, 400);
};

window.startQuizNow = async () => {
  const btn = document.getElementById('quiz-start-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Memuat kuis...'; }
  const questions = await ensureQuizLoaded(currentState.course, currentState.moduleId, currentState.lessonId);
  if (!questions || questions.length === 0) {
    const main = document.getElementById('main-content');
    const container = main?.querySelector('.quiz-container');
    if (container) {
      container.innerHTML = `<p style="color:#485f84;text-align:center;padding:40px 20px;">Kuis belum tersedia untuk bab ini.</p>`;
    }
    return;
  }
  renderQuizLesson(document.getElementById('main-content'), currentState.course, currentState.moduleId, currentState.lessonId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.speakLessonJP = (btn) => {
  const el = document.getElementById('lesson-jp');
  if (!el) return;
  const text = el.textContent || '';
  speakJapanese(text, btn);
};

window.selectLesson = (moduleId, lessonId) => {
  currentState.moduleId = moduleId;
  currentState.lessonId = lessonId;
  renderSidebar();
  renderLesson();
  renderRightPanel();
  closeSidebar();

window.toggleSidebar = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  if (!sb) return;
  const isOpen = sb.classList.toggle('mobile-open');
  if (bd) bd.classList.toggle('show', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
};

window.closeSidebar = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  if (sb) sb.classList.remove('mobile-open');
  if (bd) bd.classList.remove('show');
  document.body.style.overflow = '';
};

// Auto-close drawer when viewport resized to desktop
window.addEventListener('resize', () => {
  if (window.innerWidth > 860) closeSidebar();
});

window.toggleModule = (moduleId) => {
  const el = document.querySelector(`.module[data-module="${moduleId}"]`);
  if (el) el.classList.toggle('open');
};

window.markCompleteAndNext = () => {
  const course = COURSE_CONTENT[currentState.course];
  const key = `${currentState.moduleId}:${currentState.lessonId}`;
  const allProgress = getProgress();
  const courseProgress = allProgress[currentState.course] || {};
  const wasAlreadyDone = !!courseProgress[key];
  courseProgress[key] = true;
  allProgress[currentState.course] = courseProgress;
  setProgress(allProgress);

  if (!wasAlreadyDone) addXP(10, 'lesson selesai');

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === currentState.moduleId && x.l.id === currentState.lessonId);
  const next = allLessons[idx + 1];

  // Check if this was the last lesson of the module
  const currentModule = course.modules.find(m => m.id === currentState.moduleId);
  const moduleDoneLessons = currentModule.lessons.filter(l => courseProgress[`${currentModule.id}:${l.id}`]).length;
  const justFinishedModule = !wasAlreadyDone && moduleDoneLessons === currentModule.lessons.length;

  // Check if entire course completed
  const totalLessons = course.modules.reduce((s, m) => s + m.lessons.length, 0);
  const totalDone = Object.values(courseProgress).filter(v => v).length;
  const courseComplete = !wasAlreadyDone && totalDone === totalLessons;

  const advance = () => {
    if (next) {
      currentState.moduleId = next.m.id;
      currentState.lessonId = next.l.id;
    }
    renderSidebar();
    renderLesson();
    renderRightPanel();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (courseComplete) {
    showCompletion({
      title: '🎌 Selamat! Kelas Selesai',
      message: `Kamu telah menyelesaikan semua materi ${course.name}. 素晴らしい！`,
      xp: 50,
      continueLabel: 'Tutup',
      onContinue: advance,
    });
    addXP(50, 'kelas selesai');
  } else if (justFinishedModule) {
    showCompletion({
      title: 'Bab Selesai!',
      message: `Kamu sudah tamatkan "${currentModule.title}". Lanjut ke materi berikutnya?`,
      xp: 15,
      continueLabel: 'Lanjut →',
      onContinue: advance,
    });
    addXP(15, 'bab selesai');
  } else {
    advance();
  }
};

function renderCourseTabs(activeSlug) {
  const enrolled = getEnrolledCourses();
  // Tabs show the full catalog (CMS) plus any enrolled slugs that somehow
  // aren't in the CMS list (edge case — unpublished course user still has
  // access to). Non-enrolled tabs get a lock icon + upgrade flow.
  const cmsList = Array.isArray(_cmsCourses) ? _cmsCourses : [];
  const entries = [];
  const seen = new Set();
  for (const c of cmsList) {
    if (!c.slug) continue;
    seen.add(c.slug);
    entries.push({ slug: c.slug, name: c.title || c.slug.toUpperCase(), tagline: c.tagline || c.description || '' });
  }
  for (const slug of enrolled) {
    if (seen.has(slug)) continue;
    const c = COURSE_CONTENT[slug];
    entries.push({ slug, name: c?.name || slug.toUpperCase(), tagline: c?.tagline || '' });
  }
  const tabs = entries.map(({ slug, name, tagline }) => {
    const isEnrolled = enrolled.includes(slug);
    const isActive = slug === activeSlug;
    const classes = ['course-tab'];
    if (isActive) classes.push('active');
    if (!isEnrolled) classes.push('locked');
    const lockIcon = !isEnrolled ? '<span class="lock-icon">🔒</span>' : '';
    const title = tagline ? `${name} — ${tagline}` : name;
    return `<button class="${classes.join(' ')}" onclick="switchCourse('${slug}')" title="${title}">${slug.toUpperCase()}${lockIcon}</button>`;
  }).join('');
  const nav = document.getElementById('course-tabs');
  if (nav) nav.innerHTML = tabs;
}

window.switchCourse = async (slug) => {
  const enrolled = getEnrolledCourses();
  if (!enrolled.includes(slug)) {
    // Route through the universal checkout page. detail.html handles
    // not-found / not-available states — keeps this guard simple.
    window.location.href = `courses/detail.html?slug=${encodeURIComponent(slug)}`;
    return;
  }
  if (slug === currentState.course) { closeSidebar(); return; }
  currentState.moduleId = null;
  currentState.lessonId = null;
  history.replaceState({}, '', `welcome.html?course=${slug}`);
  renderLearning(slug);
  closeSidebar();
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
(async () => {
  if (!session) return;

  // Authoritative session check BEFORE rendering. Guarantees the rest of init
  // sees a valid server-side session — or redirects cleanly to login. Without
  // this the paywall would flash whenever localStorage ez_user outlived its
  // refresh cookie (e.g. admin revoked access, or user cleared cookies only).
  let verifiedUser = null;
  try { verifiedUser = await window.ezGetMe(); } catch { verifiedUser = null; }
  if (!verifiedUser) {
    location.replace('login.html?next=welcome.html');
    return;
  }
  // Pick up the freshly-mirrored ez_user so email/avatar reflect the actual
  // logged-in account (not whoever was cached before).
  const mirrored = JSON.parse(localStorage.getItem('ez_user') || 'null');
  if (mirrored) session = mirrored;

  const userEmailEl = document.getElementById('user-email');
  if (userEmailEl) userEmailEl.textContent = session.email;

  try {
    // Pull enrollments first — the hydrator only fetches course content for
    // slugs the user actually has access to. Flashcards are static and the
    // CMS course list (used by sidebar picker / course tabs to show
    // upgrade CTAs for non-enrolled courses) can load in parallel.
    await syncEnrollmentsFromServer();
    await Promise.all([hydrateEnrolledCourses(), loadFlashcardData(), fetchCmsCourses()]);
    // handleNewEnrollment may resync enrollments (e.g. if user just landed
    // from checkout). Re-hydrate in case it discovered a newly-paid course.
    await handleNewEnrollment();
    await hydrateEnrolledCourses();
  } catch (err) {
    // Auth died between the ezGetMe check above and this sync (rare, but
    // possible if the refresh cookie was invalidated mid-load). Bounce to
    // login rather than rendering the paywall — paywall = "go buy a course",
    // which is wrong messaging when the real issue is session expiry.
    if (err && err.message === 'AUTH_EXPIRED') {
      location.replace('login.html?next=welcome.html');
      return;
    }
    const root = document.getElementById('app-root');
    if (root) {
      root.innerHTML = `
        <div style="padding:60px 20px;text-align:center;color:#666;max-width:500px;margin:0 auto;">
          <h2 style="color:#1a1a1a;margin-bottom:12px;">Gagal memuat materi</h2>
          <p style="margin-bottom:20px;">Coba refresh halaman, atau cek koneksi internet kamu.</p>
          <button onclick="location.reload()" style="padding:10px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;">Refresh</button>
          <p style="font-size:12px;color:#999;margin-top:20px;">${(err && err.message) || err}</p>
        </div>
      `;
    }
    return;
  }

  const enrolled = getEnrolledCourses();
  const params = new URLSearchParams(window.location.search);
  const requested = params.get('course');

  if (enrolled.length === 0) {
    renderPaywall();
  } else {
    const selected = enrolled.includes(requested) ? requested : enrolled[0];
    renderCourseTabs(selected);
    renderLearning(selected);
  }
})();
</script>
