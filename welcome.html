<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - EzNihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: #f8f9fa;
    color: #191c1d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }

  /* ── Top Nav ── */
  .dash-nav {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .dash-nav-left { display: flex; align-items: center; gap: 20px; min-width: 0; flex: 1; }
  .dash-nav img { height: 36px; mix-blend-mode: multiply; flex-shrink: 0; }

  .sidebar-toggle {
    display: none;
    background: transparent;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    padding: 7px 10px;
    cursor: pointer;
    color: #191c1d;
    align-items: center;
    gap: 6px;
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .sidebar-toggle svg { flex-shrink: 0; }
  .sidebar-toggle:hover { border-color: #191c1d; }
  .sidebar-toggle.visible { display: inline-flex; }
  @media (max-width: 600px) {
    .dash-nav { padding: 10px 14px; gap: 8px; }
    .dash-nav img { height: 28px; }
    .dash-nav-left { gap: 10px; }
  }

  /* ── Course Tabs ── */
  .course-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: thin;
    padding: 4px 0;
    min-width: 0;
  }
  .course-tabs::-webkit-scrollbar { height: 4px; }
  .course-tabs::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 4px; }

  .course-tab {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: #666;
    background: transparent;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .course-tab:hover { background: #f8f9fa; color: #191c1d; }
  .course-tab.active {
    background: #191c1d;
    color: #fff;
  }
  .course-tab.active:hover { background: #2e3132; color: #fff; }
  .course-tab.locked {
    color: #a8a8a8;
    background: #fafafa;
  }
  .course-tab.locked:hover {
    color: #b20024;
    background: #fff0f2;
    border-color: #ffccd5;
  }
  .course-tab .lock-icon {
    font-size: 10px;
    opacity: 0.7;
  }
  .course-tab .price-hint {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0;
    opacity: 0.8;
  }
  @media (max-width: 600px) {
    .course-tab .price-hint { display: none; }
  }
  .dash-nav-right {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: #485f84;
    flex-shrink: 0;
  }
  .dash-nav-right #user-email {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 860px) {
    .dash-nav-right #user-email { display: none; }
  }
  @media (max-width: 600px) {
    .logout-btn { padding: 6px 10px; font-size: 12px; }
  }
  .logout-btn {
    background: transparent;
    border: 1px solid #e5e5e5;
    color: #191c1d;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: #b20024; color: #b20024; }

  /* ── Success banner ── */
  .banner {
    background: #e8f5e9;
    border-bottom: 1px solid #16a34a33;
    color: #166534;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    display: none;
  }
  .banner.show { display: block; }

  /* ── Greeting Banner ── */
  .greeting-banner {
    padding: 28px 40px 24px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .greeting-jp {
    font-family: 'Noto Sans JP', 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 500;
    color: #191c1d;
    margin: 0 0 4px;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .greeting-jp .name {
    color: #b20024;
    font-weight: 700;
  }
  .greeting-jp .san {
    color: #999;
    font-weight: 400;
    font-size: 0.65em;
    margin-left: 3px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .greeting-id {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: #485f84;
    margin: 0;
    line-height: 1.5;
  }
  .greeting-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #999;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: right;
    white-space: nowrap;
  }
  .greeting-time .kanji {
    font-family: 'Noto Sans JP', sans-serif;
    color: #b20024;
    font-size: 16px;
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
    letter-spacing: 0;
  }
  @media (max-width: 600px) {
    .greeting-banner { padding: 20px; }
    .greeting-time { display: none; }
  }

  /* ── Learning Layout ── */
  .learning-layout {
    flex: 1;
    display: block;
    min-height: 0;
  }

  /* ── Sidebar (drawer, all widths) ── */
  .sidebar {
    background: #fff;
    border-right: 1px solid #e5e5e5;
    overflow-y: auto;
    position: fixed;
    top: 0; left: 0;
    width: 86vw; max-width: 360px; height: 100vh;
    z-index: 1100;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 64px 22px 24px;
    display: flex;
    flex-direction: column;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1050;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .sidebar-backdrop.show {
    opacity: 1; pointer-events: auto;
  }
  .sidebar-close {
    display: flex;
    position: absolute;
    top: 14px; right: 14px;
    width: 36px; height: 36px;
    align-items: center; justify-content: center;
    background: #f5f5f7; border: none; border-radius: 50%;
    cursor: pointer; color: #191c1d;
  }
  .sidebar-close:hover { background: #e8e8e8; }
  .sidebar-scroll { flex: 1; min-height: 0; overflow-y: auto; margin: 0 -22px; padding: 0 22px; }

  /* ── Course Picker ── */
  .course-picker {
    margin-bottom: 14px;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }
  .course-picker-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: #fafafa;
    cursor: pointer;
    width: 100%;
    border: none;
    font-family: inherit;
    text-align: left;
  }
  .course-picker-bar:hover { background: #f3f3f5; }
  .course-picker-level {
    display: inline-flex;
    align-items: center; justify-content: center;
    min-width: 34px; height: 26px; padding: 0 8px;
    background: #191c1d; color: #fff;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .course-picker-name {
    flex: 1; min-width: 0;
    font-size: 13px; font-weight: 700; color: #191c1d;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .course-picker-caret {
    color: #999; font-size: 11px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .course-picker.open .course-picker-caret { transform: rotate(180deg); }
  .course-picker-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: #fff;
  }
  .course-picker.open .course-picker-list { max-height: 420px; }
  .course-option {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-top: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.12s;
  }
  .course-option:hover { background: #fafafa; }
  .course-option.active {
    background: #fff0f2;
  }
  .course-option .level-chip {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 30px; height: 22px; padding: 0 6px;
    border: 1px solid #e5e5e5;
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    color: #485f84;
    flex-shrink: 0;
  }
  .course-option.active .level-chip {
    background: #b20024; color: #fff; border-color: #b20024;
  }
  .course-option .opt-name {
    flex: 1; min-width: 0;
    font-size: 12.5px; font-weight: 600; color: #191c1d;
  }
  .course-option .opt-status {
    font-size: 11px; color: #999;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .course-option.locked { opacity: 0.75; }
  .course-option.locked .opt-status { color: #b20024; }
  .course-option.active .opt-status { color: #16a34a; font-weight: 700; }

  /* Sidebar footer (logout) */
  .sidebar-footer {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #f0f0f0;
  }
  .sidebar-footer .email-line {
    font-size: 11px;
    color: #999;
    margin-bottom: 10px;
    word-break: break-all;
  }
  .sidebar-logout-btn {
    width: 100%;
    background: #fff;
    border: 1px solid #e5e5e5;
    color: #191c1d;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .sidebar-logout-btn:hover { border-color: #b20024; color: #b20024; background: #fff5f5; }
  .sidebar-header {
    padding-bottom: 18px;
    border-bottom: 1px solid #f0f0f0;
    margin-bottom: 18px;
  }
  .sidebar-header h3 {
    font-size: 15px;
    font-weight: 800;
    margin: 0 0 10px;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #666;
    font-family: 'JetBrains Mono', monospace;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #f0f0f0;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #b20024;
    border-radius: 999px;
    transition: width 0.4s;
  }

  .module {
    margin-bottom: 4px;
  }
  .module-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: transparent;
    border: none;
    padding: 10px 8px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #191c1d;
    text-align: left;
    border-radius: 6px;
  }
  .module-header:hover { background: #f8f9fa; }
  .module-header .caret {
    font-size: 10px;
    color: #999;
    transition: transform 0.2s;
  }
  .module.open .module-header .caret { transform: rotate(90deg); }
  .module-num {
    font-family: 'JetBrains Mono', monospace;
    color: #b20024;
    font-size: 11px;
    margin-right: 8px;
  }

  .lessons {
    list-style: none;
    padding: 0 0 0 12px;
    margin: 0 0 8px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .module.open .lessons { max-height: 500px; }

  .lesson-item {
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    color: #485f84;
    border-left: 2px solid transparent;
    margin-left: 4px;
  }
  .lesson-item:hover { background: #fafafa; }
  .lesson-item.current {
    background: #fff0f2;
    color: #b20024;
    font-weight: 600;
    border-left-color: #b20024;
  }
  .lesson-item.done { color: #166534; }
  .lesson-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
    border: 1px solid currentColor;
  }
  .lesson-item.done .lesson-icon {
    background: #16a34a;
    border-color: #16a34a;
    color: #fff;
  }
  .lesson-item.current .lesson-icon {
    background: #b20024;
    border-color: #b20024;
    color: #fff;
  }
  .lesson-meta {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #999;
  }

  /* ── Main Content ── */
  .main-content {
    padding: 32px 40px;
    overflow-y: auto;
    min-width: 0;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  @media (max-width: 860px) { .main-content { padding: 24px 24px 32px; } }
  @media (max-width: 600px) { .main-content { padding: 18px 16px 28px; } }

  .lesson-title { font-size: clamp(22px, 5vw, 32px); }
  @media (max-width: 600px) {
    .lesson-breadcrumb { font-size: 10px; }
    .lesson-subtitle { font-size: 13px; }
  }

  .lesson-breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .lesson-breadcrumb span { color: #b20024; }
  .lesson-title {
    font-size: clamp(24px, 3.5vw, 36px);
    font-weight: 800;
    margin: 0 0 10px;
    line-height: 1.15;
  }
  .lesson-subtitle {
    font-size: 15px;
    color: #485f84;
    margin: 0 0 24px;
  }

  /* Video placeholder */
  .video-player {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #191c1d 0%, #2e3132 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .video-player::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(#ffffff08 1px, transparent 1px), linear-gradient(90deg, #ffffff08 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .play-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #b20024;
    border: none;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(178, 0, 36, 0.4);
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
  }
  .play-btn:hover { transform: scale(1.08); }
  .video-meta {
    position: absolute;
    bottom: 16px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    z-index: 1;
  }

  /* Lesson text content */
  .lesson-body {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .lesson-body h2 {
    font-size: 17px;
    font-weight: 800;
    margin: 0 0 14px;
  }
  .lesson-body p {
    font-size: 15px;
    line-height: 1.7;
    color: #2e3132;
    margin: 0 0 14px;
  }
  .lesson-body .jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px;
    color: #191c1d;
    background: #fff0f2;
    padding: 14px 18px;
    border-left: 3px solid #b20024;
    border-radius: 6px;
    margin: 18px 0;
  }
  .lesson-body .jp span { color: #b20024; font-weight: 700; }

  /* Lesson nav */
  .lesson-footer {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    margin-top: 8px;
  }
  .btn-secondary, .btn-primary {
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-secondary {
    background: #fff;
    border: 1px solid #e5e5e5;
    color: #191c1d;
  }
  .btn-secondary:hover { border-color: #191c1d; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: #b20024;
    color: #fff;
  }
  .btn-primary:hover { background: #8a0b20; }

  /* ── Paywall ── */
  .paywall {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .paywall-inner {
    max-width: 560px;
    text-align: center;
  }
  .paywall-lock {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #fff0f2;
    color: #b20024;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
  }
  .paywall h1 {
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 800;
    margin: 0 0 12px;
    line-height: 1.15;
  }
  .paywall p {
    font-size: 15px;
    color: #485f84;
    line-height: 1.6;
    margin: 0 0 28px;
  }
  .paywall-cta {
    display: inline-block;
    background: #b20024;
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 4px 0 #8a0b20, 0 10px 30px rgba(178, 0, 36, 0.25);
    transition: transform 0.15s;
  }
  .paywall-cta:hover { transform: translateY(1px); }

  .paywall-plans {
    margin-top: 48px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    text-align: left;
  }
  @media (max-width: 600px) {
    .paywall { padding: 40px 16px; }
    .paywall-plans { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 32px; }
    .mini-plan { padding: 14px; }
  }
  .mini-plan {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .mini-plan:hover {
    border-color: #b20024;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }
  .mini-plan .level {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #b20024;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .mini-plan .plan-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 800;
    margin: 6px 0 4px;
  }
  .mini-plan .plan-price {
    font-size: 13px;
    color: #485f84;
    font-weight: 500;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    max-width: 900px;
    margin: 0 auto 28px;
    padding: 0 24px;
  }
  .stats-strip {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    overflow: hidden;
  }
  @media (max-width: 860px) { .stats-bar { padding: 0 16px; margin-bottom: 20px; } }
  @media (max-width: 640px) {
    .stat-cell { padding: 12px 10px; gap: 8px; }
    .stat-icon-wrap, .goal-ring { width: 28px; height: 28px; }
    .goal-ring svg { width: 28px; height: 28px; }

<script>
// ═══════════════════════════════════════════════
// AUTH GUARD — Supabase session (fallback: localStorage)
// ═══════════════════════════════════════════════
let session = JSON.parse(localStorage.getItem('ez_user') || 'null');
if (!session) {
  window.location.replace('login.html?next=welcome.html');
}

// Verify with Supabase in background; if signed out remotely, bounce to login
(async () => {
  try {
    const sb = await ensureSupabase();
    const { data: { session: sbSession } } = await sb.auth.getSession();
    if (!sbSession) {
      localStorage.removeItem('ez_user');
      location.replace('login.html?next=welcome.html');
      return;
    }
    const mirrored = mirrorSessionToLocal(sbSession);
    if (mirrored) session = mirrored;
    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') {
        localStorage.removeItem('ez_user');
        location.replace('login.html?next=welcome.html');
      }
    });
  } catch (e) {}
})();

// ═══════════════════════════════════════════════
// CONTENT DATA (loaded from data/*.json at startup)
// ═══════════════════════════════════════════════
let COURSE_CONTENT = {};
let QUIZ_DATA = {};
let FLASHCARD_DATA = {};

async function loadContentData() {
  const [courses, quizzes, flashcards] = await Promise.all([
    fetch('data/courses.json').then(r => r.json()),
    fetch('data/quizzes.json').then(r => r.json()),
    fetch('data/flashcards.json').then(r => r.json()),
  ]);
  COURSE_CONTENT = courses;
  QUIZ_DATA = quizzes;
  FLASHCARD_DATA = flashcards;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
function getEnrolledCourses() {
  try { return JSON.parse(localStorage.getItem('ez_courses') || '[]'); }
  catch { return []; }
}
function getProgress() {
  try { return JSON.parse(localStorage.getItem('ez_progress') || '{}'); }
  catch { return {}; }
}
function setProgress(obj) {
  localStorage.setItem('ez_progress', JSON.stringify(obj));
}

// ═══════════════════════════════════════════════
// GAMIFICATION — XP, Streak, Daily Goal
// ═══════════════════════════════════════════════
const DAILY_GOAL_XP = 30;

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yesterdayStr() {
  const d = new Date(Date.now() - 86400000);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getStats() {
  try {
    const s = JSON.parse(localStorage.getItem('ez_stats') || '{}');
    return { xp: s.xp || 0, streak: s.streak || 0, lastActive: s.lastActive || null, dailyXP: s.dailyXP || 0, dailyDate: s.dailyDate || null };
  } catch { return { xp: 0, streak: 0, lastActive: null, dailyXP: 0, dailyDate: null }; }
}
function saveStats(s) { localStorage.setItem('ez_stats', JSON.stringify(s)); }

function tickActivityAndStreak() {
  const s = getStats();
  const today = todayStr();
  if (s.lastActive === today) return s;
  if (s.lastActive === yesterdayStr()) s.streak = (s.streak || 0) + 1;
  else s.streak = 1;
  s.lastActive = today;
  if (s.dailyDate !== today) { s.dailyXP = 0; s.dailyDate = today; }
  saveStats(s);
  return s;
}

function addXP(amount, reason) {
  const s = tickActivityAndStreak();
  s.xp = (s.xp || 0) + amount;
  s.dailyXP = (s.dailyXP || 0) + amount;
  saveStats(s);
  showXPToast(amount, reason);
  refreshStatsBar();
}

function showXPToast(amount, reason) {
  const existing = document.getElementById('xp-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'xp-toast';
  toast.className = 'xp-toast';
  toast.innerHTML = `<span class="bolt">⚡</span><span class="text">+${amount} XP${reason ? ' · ' + reason : ''}</span>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 2400);
}

function renderStatsBar() {
  const s = getStats();
  const today = todayStr();
  const dailyXP = s.dailyDate === today ? (s.dailyXP || 0) : 0;
  const pct = Math.min(100, Math.round((dailyXP / DAILY_GOAL_XP) * 100));
  const C = 2 * Math.PI * 14;
  const dashOffset = C * (1 - pct / 100);
  const streakIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
  const xpIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  return `
    <div class="stats-bar">
      <div class="stats-strip">
        <div class="stat-cell">
          <div class="stat-icon-wrap">${streakIcon}</div>
          <div class="stat-body">
            <div class="stat-label">Streak</div>
            <div class="stat-value${s.streak >= 3 ? ' accent' : ''}">${s.streak || 0}<span class="stat-unit">hari</span></div>
          </div>
        </div>
        <div class="stat-cell">
          <div class="stat-icon-wrap">${xpIcon}</div>
          <div class="stat-body">
            <div class="stat-label">XP</div>
            <div class="stat-value">${s.xp || 0}</div>
          </div>
        </div>
        <div class="stat-cell">
          <div class="goal-ring">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle class="goal-ring-bg" cx="18" cy="18" r="14"/>
              <circle class="goal-ring-fill" cx="18" cy="18" r="14"
                stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${dashOffset.toFixed(2)}"/>
            </svg>
            <div class="goal-ring-text">${pct}%</div>
          </div>
          <div class="stat-body">
            <div class="stat-label">Target</div>
            <div class="stat-value">${dailyXP}<span class="stat-unit">/${DAILY_GOAL_XP}</span></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function refreshStatsBar() {
  const el = document.querySelector('.stats-bar');
  if (el) el.outerHTML = renderStatsBar();
}

function fireConfetti() {
  const colors = ['#b20024', '#e11d48', '#16a34a', '#f59e0b', '#3b82f6', '#8b5cf6'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    p.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
    if (Math.random() > 0.5) p.style.borderRadius = '50%';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4500);
  }
}

function showCompletion({ title, message, xp, continueLabel, onContinue, onSecondary, secondaryLabel }) {
  const overlay = document.createElement('div');
  overlay.className = 'completion-overlay show';
  overlay.innerHTML = `
    <div class="completion-modal">
      <div class="check-circle">✓</div>
      <h2>${title}</h2>
      <p>${message}</p>
      ${xp ? `<div class="completion-xp">⚡ +${xp} XP</div>` : ''}
      <div class="completion-actions">
        ${secondaryLabel ? `<button class="btn-secondary" id="completion-sec">${secondaryLabel}</button>` : ''}
        <button class="btn-primary" id="completion-cont">${continueLabel || 'Lanjut'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  fireConfetti();
  overlay.querySelector('#completion-cont').onclick = () => {
    overlay.remove();
    if (onContinue) onContinue();
  };
  const secBtn = overlay.querySelector('#completion-sec');
  if (secBtn) secBtn.onclick = () => {
    overlay.remove();
    if (onSecondary) onSecondary();
  };
}

// PRONUNCIATION (Web Speech API)
// ═══════════════════════════════════════════════
function speakJapanese(text, btn) {
  if (!('speechSynthesis' in window)) { alert('Browser kamu tidak mendukung audio TTS.'); return; }
  const plain = text.replace(/<[^>]*>/g, '');
  const u = new SpeechSynthesisUtterance(plain);
  u.lang = 'ja-JP';
  u.rate = 0.9;
  if (btn) btn.classList.add('playing');
  u.onend = () => { if (btn) btn.classList.remove('playing'); };
  u.onerror = () => { if (btn) btn.classList.remove('playing'); };
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
window.speakJapanese = speakJapanese;

// QUIZ ENGINE
// ═══════════════════════════════════════════════
let quizState = null;

function getQuizKey(courseSlug, moduleId, lessonId) {
  return `${courseSlug}:${moduleId}:${lessonId}`;
}

function renderQuizLesson(container, courseSlug, moduleId, lessonId) {
  const key = getQuizKey(courseSlug, moduleId, lessonId);
  const questions = QUIZ_DATA[key];
  if (!questions || questions.length === 0) {
    container.innerHTML = `<div class="quiz-container"><p style="color:#485f84;">Kuis belum tersedia.</p></div>`;
    return;
  }
  quizState = { key, questions, idx: 0, correct: 0, answered: false, selected: -1 };
  renderQuizQuestion(container);
}

function renderQuizQuestion(container) {
  const { questions, idx } = quizState;
  const total = questions.length;
  const q = questions[idx];
  const letters = ['A', 'B', 'C', 'D', 'E'];
  const pctProgress = Math.round(((idx) / total) * 100);

  container.innerHTML = `
    <div class="quiz-container">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pctProgress}%"></div></div>
        <span class="quiz-progress-text">Soal ${idx + 1} / ${total}</span>
      </div>
      <h2 class="quiz-question">
        ${q.q}
        ${q.jp ? `<span class="jp">${q.jp} <button class="pronounce-btn" onclick="speakJapanese('${q.jp}', this)">🔊 Dengar</button></span>` : ''}
      </h2>
      <div class="quiz-options" id="quiz-options">
        ${q.options.map((opt, i) => `
          <button class="quiz-option" data-idx="${i}" onclick="window.pickQuizAnswer(${i})">
            <span class="quiz-option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div id="quiz-feedback"></div>
    </div>
  `;
}

window.pickQuizAnswer = (i) => {
  if (quizState.answered) return;
  quizState.answered = true;
  quizState.selected = i;
  const q = quizState.questions[quizState.idx];
  const isCorrect = i === q.correct;
  if (isCorrect) quizState.correct++;

  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((btn, bi) => {
    btn.classList.add('disabled');
    if (bi === q.correct) btn.classList.add('correct');
    if (bi === i && !isCorrect) btn.classList.add('wrong');
  });

  const feedback = document.getElementById('quiz-feedback');
  const isLast = quizState.idx === quizState.questions.length - 1;
  feedback.innerHTML = `
    <div class="quiz-explanation">
      <strong>${isCorrect ? '✓ Benar!' : '✗ Belum tepat'}</strong> — ${q.explain}
    </div>
    <button class="quiz-next-btn" onclick="window.nextQuizQuestion()">
      ${isLast ? 'Lihat Hasil →' : 'Soal Berikutnya →'}
    </button>
  `;

  if (isCorrect) addXP(5, 'jawaban benar');
};

window.nextQuizQuestion = () => {
  if (quizState.idx < quizState.questions.length - 1) {
    quizState.idx++;
    quizState.answered = false;
    quizState.selected = -1;
    renderQuizQuestion(document.getElementById('main-content'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    finishQuiz();
  }
};

function finishQuiz() {
  const { questions, correct, key } = quizState;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;
  const bonusXP = passed ? 20 : 10;

  // save best score
  const scores = JSON.parse(localStorage.getItem('ez_quiz_scores') || '{}');
  scores[key] = Math.max(scores[key] || 0, pct);
  localStorage.setItem('ez_quiz_scores', JSON.stringify(scores));

  // mark lesson as done if passed
  if (passed) {
    const [slug, mId, lId] = key.split(':');
    const allProgress = getProgress();
    const cp = allProgress[slug] || {};
    cp[`${mId}:${lId}`] = true;
    allProgress[slug] = cp;
    setProgress(allProgress);
  }

  addXP(bonusXP, passed ? 'lulus kuis' : 'mencoba kuis');
  if (passed) fireConfetti();

  document.getElementById('main-content').innerHTML = `
    <div class="quiz-container">
      <div class="quiz-results">
        <div class="trophy">${passed ? '🏆' : '💪'}</div>
        <h2>${passed ? 'Lulus!' : 'Coba Lagi'}</h2>
        <p class="subtitle">${passed ? 'Pemahaman kamu sudah cukup bagus.' : 'Minimal 70% untuk lulus. Ayo ulang!'}</p>
        <div class="score-circle">${pct}%</div>
        <p style="color:#485f84;margin:0 0 12px;">Benar ${correct} dari ${total} soal</p>
        <div class="xp-earned">⚡ +${bonusXP} XP</div>
        <div class="quiz-results-btns">
          <button class="btn-secondary" onclick="window.retryQuiz()">Ulang Kuis</button>
          <button class="btn-primary" onclick="window.continueAfterQuiz()">${passed ? 'Lanjut →' : 'Kembali ke Materi'}</button>
        </div>
      </div>
    </div>
  `;
  renderSidebar();
}

window.retryQuiz = () => {
  const [slug, mId, lId] = quizState.key.split(':');
  renderQuizLesson(document.getElementById('main-content'), slug, mId, lId);
};

window.continueAfterQuiz = () => {
  const [slug, mId, lId] = quizState.key.split(':');
  const course = COURSE_CONTENT[slug];
  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === mId && x.l.id === lId);
  const next = allLessons[idx + 1];
  if (next) {
    currentState.moduleId = next.m.id;
    currentState.lessonId = next.l.id;
    renderSidebar();
    renderLesson();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    renderLesson();
  }
};

window.openFlashcards = (courseSlug) => {

    `;

  }
  document.getElementById('main-content').innerHTML = `
    <div class="flashcard-wrap">
      <button class="back-to-lesson-btn" onclick="renderLesson()">← Kembali ke Materi</button>
      <div class="flashcard-header">

        <span class="flashcard-counter">${idx + 1} / ${cards.length}</span>
      </div>
      <div class="flashcard ${flipped ? 'flipped' : ''}" id="flash-card" onclick="window.flipFlashcard()">
        <div class="flashcard-inner">
          <div class="flashcard-face front">
            <div class="flashcard-text">${card.front}</div>
            <button class="pronounce-btn" onclick="event.stopPropagation(); window.speakJapanese('${card.front}', this)">🔊 Dengar</button>
            <div class="flashcard-hint">Klik kartu untuk lihat arti</div>
          </div>
          <div class="flashcard-face back">
            <div class="flashcard-reading">${card.reading}</div>
            <div class="flashcard-meaning">${card.back}</div>
          </div>
        </div>
      </div>
      <div class="flashcard-ratings">
        <button class="rating-btn hard" onclick="window.rateFlashcard('hard')">
          <span class="bar"></span><span>Sulit</span>
        </button>
        <button class="rating-btn medium" onclick="window.rateFlashcard('medium')">
          <span class="bar"></span><span>Sedang</span>
        </button>
        <button class="rating-btn easy" onclick="window.rateFlashcard('easy')">
          <span class="bar"></span><span>Mudah</span>
        </button>
      </div>
    </div>
  `;
}

window.flipFlashcard = () => {
  flashState.flipped = !flashState.flipped;
  const el = document.getElementById('flash-card');
  if (el) el.classList.toggle('flipped');
};

window.rateFlashcard = (rating) => {
  const xp = rating === 'easy' ? 2 : rating === 'medium' ? 3 : 5;
  addXP(xp, 'review kartu');
  flashState.idx++;
  flashState.flipped = false;
  renderFlashcard();
};

window.restartFlashcards = () => {
  flashState.idx = 0;
  flashState.flipped = false;
  flashState.cards = [...flashState.cards].sort(() => Math.random() - 0.5);
  renderFlashcard();
};

function handleNewEnrollment() {
  const params = new URLSearchParams(window.location.search);
  const newCourse = params.get('new');
  if (!newCourse || !COURSE_CONTENT[newCourse]) return null;

  const enrolled = getEnrolledCourses();
  if (!enrolled.includes(newCourse)) {
    enrolled.push(newCourse);
    localStorage.setItem('ez_courses', JSON.stringify(enrolled));
  }

  const banner = document.getElementById('success-banner');
  document.getElementById('new-course-name').textContent = COURSE_CONTENT[newCourse].name;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 6000);

  history.replaceState({}, '', `welcome.html?course=${newCourse}`);
  return newCourse;
}

function logout() {
  if (typeof ezLogout === 'function') { ezLogout(); return; }
  localStorage.removeItem('ez_user');
  localStorage.removeItem('ez_courses');
  window.location.href = 'index.html';
}

function getTimeGreeting() {

  if (h >= 5 && h < 11)  return { jp: 'おはようございます', id: 'Selamat pagi',  msg: 'Mari mulai hari dengan bahasa Jepang.',         kanji: '朝', period: 'PAGI'    };
  if (h >= 11 && h < 15) return { jp: 'こんにちは',        id: 'Selamat siang', msg: 'Istirahat sejenak — luangkan waktu belajar.',    kanji: '昼', period: 'SIANG'   };
  if (h >= 15 && h < 18) return { jp: 'こんにちは',        id: 'Selamat sore',  msg: 'Sore yang baik untuk review pelajaran.',         kanji: '夕', period: 'SORE'    };
  if (h >= 18 && h < 22) return { jp: 'こんばんは',        id: 'Selamat malam', msg: 'Akhiri hari dengan progress baru.',              kanji: '夜', period: 'MALAM'   };
  return                        { jp: 'お疲れ様です',      id: 'Sudah larut',    msg: 'Jaga kesehatan ya — belajar sebentar saja.',     kanji: '深', period: 'DINI HARI' };
}

function getUserName() {
  if (!session || !session.email) return 'teman';
  const local = session.email.split('@')[0];
  const clean = local.replace(/[._-]+/g, ' ').trim();
  return clean.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function greetingBannerHtml() {

  return `

        <h1 class="greeting-jp">${g.jp}、<span class="name">${name}</span><span class="san">さん</span></h1>

function refreshGreetingBanner() {

let currentState = { course: null, moduleId: null, lessonId: null };

function renderLearning(courseSlug) {
  const course = COURSE_CONTENT[courseSlug];
  if (!course) return renderPaywall();

  if (!currentState.moduleId) {
    const progress = getProgress()[courseSlug] || {};
    let found = false;
    for (const m of course.modules) {
      for (const l of m.lessons) {
        const key = `${m.id}:${l.id}`;
        if (!progress[key]) {
          currentState.moduleId = m.id;
          currentState.lessonId = l.id;
          found = true;
          break;
        }
      }
      if (found) break;
    }
    if (!found) {
      currentState.moduleId = course.modules[0].id;
      currentState.lessonId = course.modules[0].lessons[0].id;
    }
  }
  currentState.course = courseSlug;

  document.getElementById('app-root').innerHTML = `
    ${greetingBannerHtml()}
    ${renderStatsBar()}
    <div class="learning-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content" id="main-content"></main>
    </div>
  `;

  renderSidebar();
  renderLesson();
  document.getElementById('sidebar-toggle')?.classList.add('visible');
}

function renderSidebar() {
  const course = COURSE_CONTENT[currentState.course];
  const progress = getProgress()[currentState.course] || {};

  const totalLessons = course.modules.reduce((s, m) => s + m.lessons.length, 0);
  const doneLessons = Object.values(progress).filter(v => v).length;
  const pct = Math.round((doneLessons / totalLessons) * 100);

  const modulesHtml = course.modules.map(m => {
    const lessonsHtml = m.lessons.map(l => {
      const key = `${m.id}:${l.id}`;
      const isDone = !!progress[key];
      const isCurrent = m.id === currentState.moduleId && l.id === currentState.lessonId;
      const icon = l.type === 'quiz' ? '?' : (isDone ? '✓' : '▶');
      return `
        <li class="lesson-item ${isCurrent ? 'current' : ''} ${isDone ? 'done' : ''}"
            onclick="selectLesson('${m.id}', '${l.id}')">
          <span class="lesson-icon">${icon}</span>
          <span>${l.title}</span>
          <span class="lesson-meta">${l.duration}</span>
        </li>
      `;
    }).join('');

    const isOpen = m.id === currentState.moduleId;
    return `
      <div class="module ${isOpen ? 'open' : ''}" data-module="${m.id}">
        <button class="module-header" onclick="toggleModule('${m.id}')">
          <span><span class="module-num">${m.num}</span>${m.title}</span>
          <span class="caret">▶</span>
        </button>
        <ul class="lessons">${lessonsHtml}</ul>
      </div>
    `;
  }).join('');

  const flashCount = (FLASHCARD_DATA[currentState.course] || []).length;

  const enrolled = getEnrolledCourses();
  const courseOptionsHtml = Object.entries(COURSE_CONTENT).map(([slug, c]) => {
    const isEnrolled = enrolled.includes(slug);
    const isActive = slug === currentState.course;
    const classes = ['course-option'];
    if (isActive) classes.push('active');
    if (!isEnrolled) classes.push('locked');
    const status = isActive
      ? '<span class="opt-status">✓ Aktif</span>'
      : (!isEnrolled ? '<span class="opt-status">🔒 Upgrade</span>' : '<span class="opt-status">Pindah →</span>');
    return `
      <div class="${classes.join(' ')}" onclick="switchCourse('${slug}')">
        <span class="level-chip">${slug.toUpperCase()}</span>
        <span class="opt-name">${c.name}</span>
        ${status}
      </div>
    `;

window.toggleCoursePicker = () => {
  document.getElementById('course-picker')?.classList.toggle('open');
};

function renderLesson() {
  const course = COURSE_CONTENT[currentState.course];
  const module = course.modules.find(m => m.id === currentState.moduleId);
  const lesson = module.lessons.find(l => l.id === currentState.lessonId);
  const progress = getProgress()[currentState.course] || {};
  const key = `${module.id}:${lesson.id}`;
  const isDone = !!progress[key];

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === module.id && x.l.id === lesson.id);
  const prev = allLessons[idx - 1];
  const next = allLessons[idx + 1];

  // Handle interactive quiz
  if (lesson.type === 'quiz') {
    const quizKey = getQuizKey(currentState.course, module.id, lesson.id);
    const hasQuestions = !!QUIZ_DATA[quizKey];
    const scores = JSON.parse(localStorage.getItem('ez_quiz_scores') || '{}');
    const bestScore = scores[quizKey] || 0;

    document.getElementById('main-content').innerHTML = `
      <p class="lesson-breadcrumb">${course.name} · Modul <span>${module.num}</span> · KUIS</p>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${module.title} — ${lesson.duration}</p>

      <div class="quiz-container">
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:48px;margin-bottom:12px;">📝</div>
          <h2 style="font-size:22px;font-weight:800;margin:0 0 8px;">Siap untuk kuis?</h2>
          <p style="color:#485f84;margin:0 0 20px;">${lesson.body || 'Tes pemahaman kamu di bab ini.'}</p>
          ${bestScore > 0 ? `<div style="display:inline-block;padding:8px 18px;background:#fff0f2;color:#b20024;border-radius:999px;font-weight:700;font-size:13px;margin-bottom:20px;">Skor terbaik: ${bestScore}%</div><br/>` : ''}
          <button class="btn-primary" onclick="window.startQuizNow()" ${!hasQuestions ? 'disabled style="opacity:0.5"' : ''}>
            ${hasQuestions ? (bestScore > 0 ? 'Ulang Kuis →' : 'Mulai Kuis →') : 'Kuis segera hadir'}
          </button>
        </div>
      </div>

      <div class="lesson-footer" style="margin-top:20px;">
        <button class="btn-secondary" ${!prev ? 'disabled' : ''} onclick="${prev ? `selectLesson('${prev.m.id}','${prev.l.id}')` : ''}">
          ← Sebelumnya
        </button>
      </div>
    `;
    return;
  }

  // Regular lesson (video/text)
  const videoBlock = `
    <div class="video-player">
      <button class="play-btn" onclick="alert('Video player belum terintegrasi.')">▶</button>
      <span class="video-meta">${lesson.type.toUpperCase()} · ${lesson.duration.toUpperCase()}</span>
    </div>
  `;

  document.getElementById('main-content').innerHTML = `
    <p class="lesson-breadcrumb">${course.name} · Modul <span>${module.num}</span> · ${lesson.type.toUpperCase()}</p>
    <h1 class="lesson-title">${lesson.title}</h1>
    <p class="lesson-subtitle">${module.title} — ${lesson.duration}</p>

    ${videoBlock}

    <div class="lesson-body">
      <h2>Catatan Pelajaran ${lesson.jp ? `<button class="pronounce-btn" style="vertical-align:middle;font-size:11px;" onclick="window.speakLessonJP(this)">🔊 Putar Jepang</button>` : ''}</h2>
      <p>${lesson.body}</p>
      ${lesson.jp ? `<div class="jp" id="lesson-jp">${lesson.jp}</div>` : ''}
      <p style="color:#999;font-size:13px;margin-top:18px;">Materi lengkap: video tutorial, contoh audio, dan worksheet PDF tersedia saat belajar.</p>
    </div>

    <div class="lesson-footer">
      <button class="btn-secondary" ${!prev ? 'disabled' : ''} onclick="${prev ? `selectLesson('${prev.m.id}','${prev.l.id}')` : ''}">
        ← Sebelumnya
      </button>
      <button class="btn-primary" onclick="markCompleteAndNext()">
        ${isDone ? (next ? 'Lanjut →' : 'Selesai ✓') : (next ? 'Tandai Selesai & Lanjut →' : 'Tandai Selesai ✓')}
      </button>
    </div>
  `;
}

window.startQuizNow = () => {
  renderQuizLesson(document.getElementById('main-content'), currentState.course, currentState.moduleId, currentState.lessonId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.speakLessonJP = (btn) => {
  const el = document.getElementById('lesson-jp');
  if (!el) return;
  const text = el.textContent || '';
  speakJapanese(text, btn);
};

window.selectLesson = (moduleId, lessonId) => {
  currentState.moduleId = moduleId;
  currentState.lessonId = lessonId;
  renderSidebar();
  renderLesson();
  closeSidebar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.toggleSidebar = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  if (!sb) return;
  const isOpen = sb.classList.toggle('mobile-open');
  if (bd) bd.classList.toggle('show', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
};

window.closeSidebar = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  if (sb) sb.classList.remove('mobile-open');
  if (bd) bd.classList.remove('show');
  document.body.style.overflow = '';
};

// Auto-close drawer when viewport resized to desktop
window.addEventListener('resize', () => {
  if (window.innerWidth > 860) closeSidebar();
});

window.toggleModule = (moduleId) => {
  const el = document.querySelector(`.module[data-module="${moduleId}"]`);
  if (el) el.classList.toggle('open');
};

window.markCompleteAndNext = () => {
  const course = COURSE_CONTENT[currentState.course];
  const key = `${currentState.moduleId}:${currentState.lessonId}`;
  const allProgress = getProgress();
  const courseProgress = allProgress[currentState.course] || {};
  const wasAlreadyDone = !!courseProgress[key];
  courseProgress[key] = true;
  allProgress[currentState.course] = courseProgress;
  setProgress(allProgress);

  if (!wasAlreadyDone) addXP(10, 'lesson selesai');

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === currentState.moduleId && x.l.id === currentState.lessonId);
  const next = allLessons[idx + 1];

  // Check if this was the last lesson of the module
  const currentModule = course.modules.find(m => m.id === currentState.moduleId);
  const moduleDoneLessons = currentModule.lessons.filter(l => courseProgress[`${currentModule.id}:${l.id}`]).length;
  const justFinishedModule = !wasAlreadyDone && moduleDoneLessons === currentModule.lessons.length;

  // Check if entire course completed
  const totalLessons = course.modules.reduce((s, m) => s + m.lessons.length, 0);
  const totalDone = Object.values(courseProgress).filter(v => v).length;
  const courseComplete = !wasAlreadyDone && totalDone === totalLessons;

  const advance = () => {
    if (next) {
      currentState.moduleId = next.m.id;
      currentState.lessonId = next.l.id;
    }
    renderSidebar();
    renderLesson();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (courseComplete) {
    showCompletion({
      title: '🎌 Selamat! Kelas Selesai',
      message: `Kamu telah menyelesaikan semua materi ${course.name}. 素晴らしい！`,
      xp: 50,
      continueLabel: 'Tutup',
      onContinue: advance,
    });
    addXP(50, 'kelas selesai');
  } else if (justFinishedModule) {
    showCompletion({
      title: 'Bab Selesai!',
      message: `Kamu sudah tamatkan "${currentModule.title}". Lanjut ke materi berikutnya?`,
      xp: 15,
      continueLabel: 'Lanjut →',
      onContinue: advance,
    });
    addXP(15, 'bab selesai');
  } else {
    advance();
  }
};

function renderCourseTabs(activeSlug) {
  const enrolled = getEnrolledCourses();
  const tabs = Object.entries(COURSE_CONTENT).map(([slug, c]) => {
    const isEnrolled = enrolled.includes(slug);
    const isActive = slug === activeSlug;
    const classes = ['course-tab'];
    if (isActive) classes.push('active');
    if (!isEnrolled) classes.push('locked');
    const lockIcon = !isEnrolled ? '<span class="lock-icon">🔒</span>' : '';
    return `<button class="${classes.join(' ')}" onclick="switchCourse('${slug}')" title="${c.name} — ${c.tagline}">${slug.toUpperCase()}${lockIcon}</button>`;
  }).join('');
  const nav = document.getElementById('course-tabs');
  if (nav) nav.innerHTML = tabs;
}

window.switchCourse = (slug) => {
  const enrolled = getEnrolledCourses();
  if (!enrolled.includes(slug)) {
    window.location.href = `courses/${slug}.html`;
    return;
  }
  if (slug === currentState.course) { closeSidebar(); return; }
  currentState.moduleId = null;
  currentState.lessonId = null;
  history.replaceState({}, '', `welcome.html?course=${slug}`);
  renderLearning(slug);
  closeSidebar();
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
(async () => {
  if (!session) return;

  try {
    await loadContentData();
  } catch (err) {
    const root = document.getElementById('app-root');
    if (root) {
      root.innerHTML = `
        <div style="padding:60px 20px;text-align:center;color:#666;max-width:500px;margin:0 auto;">
          <h2 style="color:#1a1a1a;margin-bottom:12px;">Gagal memuat materi</h2>
          <p style="margin-bottom:20px;">Coba refresh halaman, atau cek koneksi internet kamu.</p>
          <button onclick="location.reload()" style="padding:10px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;">Refresh</button>
          <p style="font-size:12px;color:#999;margin-top:20px;">${(err && err.message) || err}</p>
        </div>
      `;
    }
    return;
  }

  const userEmailEl = document.getElementById('user-email');
  if (userEmailEl) userEmailEl.textContent = session.email;

  handleNewEnrollment();

  const enrolled = getEnrolledCourses();
  const params = new URLSearchParams(window.location.search);
  const requested = params.get('course');

  if (enrolled.length === 0) {
    renderPaywall();
  } else {
    const selected = enrolled.includes(requested) ? requested : enrolled[0];
    renderCourseTabs(selected);
    renderLearning(selected);
  }
})();
</script>
