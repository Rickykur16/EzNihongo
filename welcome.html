<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - EzNihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: #f8f9fa;
    color: #191c1d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }

  /* ── Top Nav ── */
  .dash-nav {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .dash-nav-left { display: flex; align-items: center; gap: 20px; min-width: 0; flex: 1; }
  .dash-nav img { height: 36px; mix-blend-mode: multiply; flex-shrink: 0; }

  /* ── Course Tabs ── */
  .course-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: thin;
    padding: 4px 0;
    min-width: 0;
  }
  .course-tabs::-webkit-scrollbar { height: 4px; }
  .course-tabs::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 4px; }

  .course-tab {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: #666;
    background: transparent;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .course-tab:hover { background: #f8f9fa; color: #191c1d; }
  .course-tab.active {
    background: #191c1d;
    color: #fff;
  }
  .course-tab.active:hover { background: #2e3132; color: #fff; }
  .course-tab.locked {
    color: #a8a8a8;
    background: #fafafa;
  }
  .course-tab.locked:hover {
    color: #b20024;
    background: #fff0f2;
    border-color: #ffccd5;
  }
  .course-tab .lock-icon {
    font-size: 10px;
    opacity: 0.7;
  }
  .course-tab .price-hint {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0;
    opacity: 0.8;
  }
  @media (max-width: 600px) {
    .course-tab .price-hint { display: none; }
  }
  .dash-nav-right {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: #485f84;
  }
  .logout-btn {
    background: transparent;
    border: 1px solid #e5e5e5;
    color: #191c1d;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: #b20024; color: #b20024; }

  /* ── Success banner ── */
  .banner {
    background: #e8f5e9;
    border-bottom: 1px solid #16a34a33;
    color: #166534;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    display: none;
  }
  .banner.show { display: block; }

  /* ── Greeting Banner ── */
  .greeting-banner {
    padding: 28px 40px 24px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .greeting-jp {
    font-family: 'Noto Sans JP', 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 500;
    color: #191c1d;
    margin: 0 0 4px;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .greeting-jp .name {
    color: #b20024;
    font-weight: 700;
  }
  .greeting-jp .san {
    color: #999;
    font-weight: 400;
    font-size: 0.65em;
    margin-left: 3px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .greeting-id {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: #485f84;
    margin: 0;
    line-height: 1.5;
  }
  .greeting-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #999;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: right;
    white-space: nowrap;
  }
  .greeting-time .kanji {
    font-family: 'Noto Sans JP', sans-serif;
    color: #b20024;
    font-size: 16px;
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
    letter-spacing: 0;
  }
  @media (max-width: 600px) {
    .greeting-banner { padding: 20px; }
    .greeting-time { display: none; }
  }

  /* ── Learning Layout ── */
  .learning-layout {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 0;
  }
  @media (max-width: 860px) {
    .learning-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.mobile-open { display: block; }
  }

  /* ── Sidebar ── */
  .sidebar {
    background: #fff;
    border-right: 1px solid #e5e5e5;
    padding: 24px;
    overflow-y: auto;
  }
  .sidebar-header {
    padding-bottom: 18px;
    border-bottom: 1px solid #f0f0f0;
    margin-bottom: 18px;
  }
  .sidebar-header h3 {
    font-size: 15px;
    font-weight: 800;
    margin: 0 0 10px;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #666;
    font-family: 'JetBrains Mono', monospace;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #f0f0f0;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #b20024;
    border-radius: 999px;
    transition: width 0.4s;
  }

  .module {
    margin-bottom: 4px;
  }
  .module-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: transparent;
    border: none;
    padding: 10px 8px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #191c1d;
    text-align: left;
    border-radius: 6px;
  }
  .module-header:hover { background: #f8f9fa; }
  .module-header .caret {
    font-size: 10px;
    color: #999;
    transition: transform 0.2s;
  }
  .module.open .module-header .caret { transform: rotate(90deg); }
  .module-num {
    font-family: 'JetBrains Mono', monospace;
    color: #b20024;
    font-size: 11px;
    margin-right: 8px;
  }

  .lessons {
    list-style: none;
    padding: 0 0 0 12px;
    margin: 0 0 8px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .module.open .lessons { max-height: 500px; }

  .lesson-item {
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    color: #485f84;
    border-left: 2px solid transparent;
    margin-left: 4px;
  }
  .lesson-item:hover { background: #fafafa; }
  .lesson-item.current {
    background: #fff0f2;
    color: #b20024;
    font-weight: 600;
    border-left-color: #b20024;
  }
  .lesson-item.done { color: #166534; }
  .lesson-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
    border: 1px solid currentColor;
  }
  .lesson-item.done .lesson-icon {
    background: #16a34a;
    border-color: #16a34a;
    color: #fff;
  }
  .lesson-item.current .lesson-icon {
    background: #b20024;
    border-color: #b20024;
    color: #fff;
  }
  .lesson-meta {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #999;
  }

  /* ── Main Content ── */
  .main-content {
    padding: 32px 40px;
    overflow-y: auto;
  }
  @media (max-width: 600px) { .main-content { padding: 20px; } }

  .lesson-breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .lesson-breadcrumb span { color: #b20024; }
  .lesson-title {
    font-size: clamp(24px, 3.5vw, 36px);
    font-weight: 800;
    margin: 0 0 10px;
    line-height: 1.15;
  }
  .lesson-subtitle {
    font-size: 15px;
    color: #485f84;
    margin: 0 0 24px;
  }

  /* Video placeholder */
  .video-player {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #191c1d 0%, #2e3132 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .video-player::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(#ffffff08 1px, transparent 1px), linear-gradient(90deg, #ffffff08 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .play-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #b20024;
    border: none;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(178, 0, 36, 0.4);
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
  }
  .play-btn:hover { transform: scale(1.08); }
  .video-meta {
    position: absolute;
    bottom: 16px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    z-index: 1;
  }

  /* Lesson text content */
  .lesson-body {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .lesson-body h2 {
    font-size: 17px;
    font-weight: 800;
    margin: 0 0 14px;
  }
  .lesson-body p {
    font-size: 15px;
    line-height: 1.7;
    color: #2e3132;
    margin: 0 0 14px;
  }
  .lesson-body .jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px;
    color: #191c1d;
    background: #fff0f2;
    padding: 14px 18px;
    border-left: 3px solid #b20024;
    border-radius: 6px;
    margin: 18px 0;
  }
  .lesson-body .jp span { color: #b20024; font-weight: 700; }

  /* Lesson nav */
  .lesson-footer {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    margin-top: 8px;
  }
  .btn-secondary, .btn-primary {
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-secondary {
    background: #fff;
    border: 1px solid #e5e5e5;
    color: #191c1d;
  }
  .btn-secondary:hover { border-color: #191c1d; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: #b20024;
    color: #fff;
  }
  .btn-primary:hover { background: #8a0b20; }

  /* ── Paywall ── */
  .paywall {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .paywall-inner {
    max-width: 560px;
    text-align: center;
  }
  .paywall-lock {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #fff0f2;
    color: #b20024;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
  }
  .paywall h1 {
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 800;
    margin: 0 0 12px;
    line-height: 1.15;
  }
  .paywall p {
    font-size: 15px;
    color: #485f84;
    line-height: 1.6;
    margin: 0 0 28px;
  }
  .paywall-cta {
    display: inline-block;
    background: #b20024;
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 4px 0 #8a0b20, 0 10px 30px rgba(178, 0, 36, 0.25);
    transition: transform 0.15s;
  }
  .paywall-cta:hover { transform: translateY(1px); }

  .paywall-plans {
    margin-top: 48px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    text-align: left;
  }
  .mini-plan {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .mini-plan:hover {
    border-color: #b20024;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }
  .mini-plan .level {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #b20024;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .mini-plan .plan-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 800;
    margin: 6px 0 4px;
  }
  .mini-plan .plan-price {
    font-size: 13px;
    color: #485f84;
    font-weight: 500;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    max-width: 900px;
    margin: 0 auto 28px;
    padding: 0 24px;
  }
  .stats-strip {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    overflow: hidden;
  }
  @media (max-width: 640px) { .stats-strip { grid-template-columns: 1fr; } }
  .stat-cell {
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-right: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-cell:hover { background: #fafafa; }
  .stat-icon-wrap {
    width: 36px; height: 36px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #485f84;
  }
  .stat-body { flex: 1; min-width: 0; }
  .stat-label {
    font-size: 10px; color: #999;
    text-transform: uppercase; letter-spacing: 0.1em;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 18px; font-weight: 800; color: #191c1d; line-height: 1.1;
  }
  .stat-value.accent { color: #b20024; }
  .stat-sub { font-size: 11px; color: #bbb; margin-top: 2px; }
  .goal-ring { position: relative; width: 36px; height: 36px; flex-shrink: 0; }
  .goal-ring svg { transform: rotate(-90deg); }
  .goal-ring-bg { fill: none; stroke: #f0f0f0; stroke-width: 3; }
  .goal-ring-fill { fill: none; stroke: #191c1d; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
  .goal-ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; color: #191c1d;
  }

  /* ── Flashcard Button in Sidebar ── */
  .flashcard-cta {
    margin: 12px 0 4px;
    background: #f5f5f7;
    color: #191c1d;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e8e8e8;
    width: 100%;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .flashcard-cta:hover { background: #191c1d; color: #fff; border-color: #191c1d; }
  .flashcard-cta .icon { opacity: 0.5; }
  .flashcard-cta .count {
    margin-left: auto;
    background: #e8e8e8;
    color: #485f84;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }
  .flashcard-cta:hover .count { background: rgba(255,255,255,0.15); color: #fff; }

  /* ── Interactive Quiz ── */
  .quiz-container {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 18px;
    padding: 32px;
    margin-top: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
  }
  @media (max-width: 600px) { .quiz-container { padding: 20px; } }
  .quiz-progress-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .quiz-progress-bar {
    flex: 1; height: 6px; background: #f0f0f0; border-radius: 999px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%; background: linear-gradient(90deg, #b20024, #e11d48); transition: width 0.4s;
  }
  .quiz-progress-text {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #485f84; font-weight: 700; white-space: nowrap;
  }
  .quiz-question {
    font-size: 20px; font-weight: 800; color: #191c1d;
    line-height: 1.4; margin-bottom: 20px;
  }
  .quiz-question .jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(28px, 5vw, 40px);
    color: #b20024; display: block; margin: 12px 0;
  }
  .quiz-options { display: grid; gap: 10px; }
  .quiz-option {
    padding: 13px 16px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-left: 3px solid transparent;
    border-radius: 8px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px; font-weight: 500; color: #191c1d;
    text-align: left; cursor: pointer;
    transition: all 0.12s;
    display: flex; align-items: center; gap: 12px;
  }
  .quiz-option:hover:not(.disabled) { border-left-color: #191c1d; background: #fafafa; }
  .quiz-option.correct { border-left-color: #16a34a; background: #f0fdf4; color: #166534; border-color: #bbf7d0; border-left-color: #16a34a; }
  .quiz-option.wrong { border-left-color: #dc2626; background: #fff8f8; color: #7f1d1d; border-color: #fecaca; border-left-color: #dc2626; }
  .quiz-option.disabled { cursor: not-allowed; }
  .quiz-option-letter {
    width: 22px; height: 22px; border-radius: 4px;
    background: #f5f5f5; border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; flex-shrink: 0;
    color: #999; font-family: 'JetBrains Mono', monospace;
  }
  .quiz-option.correct .quiz-option-letter { background: #16a34a; color: #fff; }
  .quiz-option.wrong .quiz-option-letter { background: #dc2626; color: #fff; }
  .quiz-explanation {
    margin-top: 16px; padding: 14px 18px;
    background: #f8f9fa; border-left: 3px solid #b20024;
    border-radius: 8px; font-size: 14px; color: #485f84; line-height: 1.6;
    animation: slideDown 0.3s;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .quiz-next-btn {
    margin-top: 20px; padding: 14px 28px;
    background: #b20024; color: #fff; border: none;
    border-radius: 10px; font-family: 'Manrope', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .quiz-next-btn:hover { background: #8a0b20; }

  /* Quiz Results */
  .quiz-results { text-align: center; padding: 32px 24px; }
  .quiz-results .trophy { font-size: 64px; margin-bottom: 12px; animation: bounce 0.6s; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .quiz-results h2 { font-size: 26px; font-weight: 800; margin: 0 0 4px; }
  .quiz-results .subtitle { color: #485f84; font-size: 14px; margin-bottom: 24px; }
  .quiz-results .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: #fff; border: 8px solid #b20024;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;

// ═══════════════════════════════════════════════
// GAMIFICATION — XP, Streak, Daily Goal
// ═══════════════════════════════════════════════
const DAILY_GOAL_XP = 30;

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yesterdayStr() {
  const d = new Date(Date.now() - 86400000);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getStats() {
  try {
    const s = JSON.parse(localStorage.getItem('ez_stats') || '{}');
    return { xp: s.xp || 0, streak: s.streak || 0, lastActive: s.lastActive || null, dailyXP: s.dailyXP || 0, dailyDate: s.dailyDate || null };
  } catch { return { xp: 0, streak: 0, lastActive: null, dailyXP: 0, dailyDate: null }; }
}
function saveStats(s) { localStorage.setItem('ez_stats', JSON.stringify(s)); }

function tickActivityAndStreak() {
  const s = getStats();
  const today = todayStr();
  if (s.lastActive === today) return s;
  if (s.lastActive === yesterdayStr()) s.streak = (s.streak || 0) + 1;
  else s.streak = 1;
  s.lastActive = today;
  if (s.dailyDate !== today) { s.dailyXP = 0; s.dailyDate = today; }
  saveStats(s);
  return s;
}

function addXP(amount, reason) {
  const s = tickActivityAndStreak();
  s.xp = (s.xp || 0) + amount;
  s.dailyXP = (s.dailyXP || 0) + amount;
  saveStats(s);
  showXPToast(amount, reason);
  refreshStatsBar();
}

function showXPToast(amount, reason) {
  const existing = document.getElementById('xp-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'xp-toast';
  toast.className = 'xp-toast';
  toast.innerHTML = `<span class="bolt">⚡</span><span class="text">+${amount} XP${reason ? ' · ' + reason : ''}</span>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 2400);
}

function renderStatsBar() {
  const s = getStats();
  const today = todayStr();
  const dailyXP = s.dailyDate === today ? (s.dailyXP || 0) : 0;
  const pct = Math.min(100, Math.round((dailyXP / DAILY_GOAL_XP) * 100));
  const C = 2 * Math.PI * 14;
  const dashOffset = C * (1 - pct / 100);
  const streakIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
  const xpIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  return `
    <div class="stats-bar">
      <div class="stats-strip">
        <div class="stat-cell">
          <div class="stat-icon-wrap">${streakIcon}</div>
          <div class="stat-body">
            <div class="stat-label">Streak Belajar</div>
            <div class="stat-value${s.streak >= 3 ? ' accent' : ''}">${s.streak || 0} hari</div>
            <div class="stat-sub">${s.streak >= 1 ? 'Konsisten!' : 'Mulai hari ini'}</div>
          </div>
        </div>
        <div class="stat-cell">
          <div class="stat-icon-wrap">${xpIcon}</div>
          <div class="stat-body">
            <div class="stat-label">Total XP</div>
            <div class="stat-value">${s.xp || 0}</div>
            <div class="stat-sub">+${dailyXP} hari ini</div>
          </div>
        </div>
        <div class="stat-cell">
          <div class="goal-ring">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle class="goal-ring-bg" cx="18" cy="18" r="14"/>
              <circle class="goal-ring-fill" cx="18" cy="18" r="14"
                stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${dashOffset.toFixed(2)}"/>
            </svg>
            <div class="goal-ring-text">${pct}%</div>
          </div>
          <div class="stat-body">
            <div class="stat-label">Target Harian</div>
            <div class="stat-value">${dailyXP}<span style="font-size:13px;font-weight:500;color:#999;">/${DAILY_GOAL_XP} XP</span></div>
            <div class="stat-sub">${pct >= 100 ? 'Target tercapai' : `Sisa ${Math.max(0, DAILY_GOAL_XP - dailyXP)} XP`}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function refreshStatsBar() {
  const el = document.querySelector('.stats-bar');
  if (el) el.outerHTML = renderStatsBar();
}

// CONFETTI + COMPLETION MODAL
// ═══════════════════════════════════════════════
function fireConfetti() {
  const colors = ['#b20024', '#e11d48', '#16a34a', '#f59e0b', '#3b82f6', '#8b5cf6'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    p.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
    if (Math.random() > 0.5) p.style.borderRadius = '50%';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4500);
  }
}

function showCompletion({ title, message, xp, continueLabel, onContinue, onSecondary, secondaryLabel }) {
  const overlay = document.createElement('div');
  overlay.className = 'completion-overlay show';
  overlay.innerHTML = `
    <div class="completion-modal">
      <div class="check-circle">✓</div>
      <h2>${title}</h2>
      <p>${message}</p>
      ${xp ? `<div class="completion-xp">⚡ +${xp} XP</div>` : ''}
      <div class="completion-actions">
        ${secondaryLabel ? `<button class="btn-secondary" id="completion-sec">${secondaryLabel}</button>` : ''}
        <button class="btn-primary" id="completion-cont">${continueLabel || 'Lanjut'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  fireConfetti();
  overlay.querySelector('#completion-cont').onclick = () => {
    overlay.remove();
    if (onContinue) onContinue();
  };
  const secBtn = overlay.querySelector('#completion-sec');
  if (secBtn) secBtn.onclick = () => {
    overlay.remove();
    if (onSecondary) onSecondary();
  };
}

// PRONUNCIATION (Web Speech API)
// ═══════════════════════════════════════════════
function speakJapanese(text, btn) {
  if (!('speechSynthesis' in window)) { alert('Browser kamu tidak mendukung audio TTS.'); return; }
  const plain = text.replace(/<[^>]*>/g, '');
  const u = new SpeechSynthesisUtterance(plain);
  u.lang = 'ja-JP';
  u.rate = 0.9;
  if (btn) btn.classList.add('playing');
  u.onend = () => { if (btn) btn.classList.remove('playing'); };
  u.onerror = () => { if (btn) btn.classList.remove('playing'); };
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
window.speakJapanese = speakJapanese;

// ═══════════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════════
let quizState = null;

function getQuizKey(courseSlug, moduleId, lessonId) {
  return `${courseSlug}:${moduleId}:${lessonId}`;
}

function renderQuizLesson(container, courseSlug, moduleId, lessonId) {
  const key = getQuizKey(courseSlug, moduleId, lessonId);
  const questions = QUIZ_DATA[key];
  if (!questions || questions.length === 0) {
    container.innerHTML = `<div class="quiz-container"><p style="color:#485f84;">Kuis belum tersedia.</p></div>`;
    return;
  }
  quizState = { key, questions, idx: 0, correct: 0, answered: false, selected: -1 };
  renderQuizQuestion(container);
}

function renderQuizQuestion(container) {
  const { questions, idx } = quizState;
  const total = questions.length;
  const q = questions[idx];
  const letters = ['A', 'B', 'C', 'D', 'E'];
  const pctProgress = Math.round(((idx) / total) * 100);

  container.innerHTML = `
    <div class="quiz-container">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pctProgress}%"></div></div>
        <span class="quiz-progress-text">Soal ${idx + 1} / ${total}</span>
      </div>
      <h2 class="quiz-question">
        ${q.q}
        ${q.jp ? `<span class="jp">${q.jp} <button class="pronounce-btn" onclick="speakJapanese('${q.jp}', this)">🔊 Dengar</button></span>` : ''}
      </h2>
      <div class="quiz-options" id="quiz-options">
        ${q.options.map((opt, i) => `
          <button class="quiz-option" data-idx="${i}" onclick="window.pickQuizAnswer(${i})">
            <span class="quiz-option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div id="quiz-feedback"></div>
    </div>
  `;
}

window.pickQuizAnswer = (i) => {
  if (quizState.answered) return;
  quizState.answered = true;
  quizState.selected = i;
  const q = quizState.questions[quizState.idx];
  const isCorrect = i === q.correct;
  if (isCorrect) quizState.correct++;

  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((btn, bi) => {
    btn.classList.add('disabled');
    if (bi === q.correct) btn.classList.add('correct');
    if (bi === i && !isCorrect) btn.classList.add('wrong');
  });

  const feedback = document.getElementById('quiz-feedback');
  const isLast = quizState.idx === quizState.questions.length - 1;
  feedback.innerHTML = `
    <div class="quiz-explanation">
      <strong>${isCorrect ? '✓ Benar!' : '✗ Belum tepat'}</strong> — ${q.explain}
    </div>
    <button class="quiz-next-btn" onclick="window.nextQuizQuestion()">
      ${isLast ? 'Lihat Hasil →' : 'Soal Berikutnya →'}
    </button>
  `;

  if (isCorrect) addXP(5, 'jawaban benar');
};

window.nextQuizQuestion = () => {
  if (quizState.idx < quizState.questions.length - 1) {
    quizState.idx++;
    quizState.answered = false;
    quizState.selected = -1;
    renderQuizQuestion(document.getElementById('main-content'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    finishQuiz();
  }
};

function finishQuiz() {
  const { questions, correct, key } = quizState;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;
  const bonusXP = passed ? 20 : 10;

  // save best score
  const scores = JSON.parse(localStorage.getItem('ez_quiz_scores') || '{}');
  scores[key] = Math.max(scores[key] || 0, pct);
  localStorage.setItem('ez_quiz_scores', JSON.stringify(scores));

  // mark lesson as done if passed
  if (passed) {
    const [slug, mId, lId] = key.split(':');
    const allProgress = getProgress();
    const cp = allProgress[slug] || {};
    cp[`${mId}:${lId}`] = true;
    allProgress[slug] = cp;
    setProgress(allProgress);
  }

  addXP(bonusXP, passed ? 'lulus kuis' : 'mencoba kuis');
  if (passed) fireConfetti();

  document.getElementById('main-content').innerHTML = `
    <div class="quiz-container">
      <div class="quiz-results">
        <div class="trophy">${passed ? '🏆' : '💪'}</div>
        <h2>${passed ? 'Lulus!' : 'Coba Lagi'}</h2>
        <p class="subtitle">${passed ? 'Pemahaman kamu sudah cukup bagus.' : 'Minimal 70% untuk lulus. Ayo ulang!'}</p>
        <div class="score-circle">${pct}%</div>
        <p style="color:#485f84;margin:0 0 12px;">Benar ${correct} dari ${total} soal</p>
        <div class="xp-earned">⚡ +${bonusXP} XP</div>
        <div class="quiz-results-btns">
          <button class="btn-secondary" onclick="window.retryQuiz()">Ulang Kuis</button>
          <button class="btn-primary" onclick="window.continueAfterQuiz()">${passed ? 'Lanjut →' : 'Kembali ke Materi'}</button>
        </div>
      </div>
    </div>
  `;
  renderSidebar();
}

window.retryQuiz = () => {
  const [slug, mId, lId] = quizState.key.split(':');
  renderQuizLesson(document.getElementById('main-content'), slug, mId, lId);
};

window.continueAfterQuiz = () => {
  const [slug, mId, lId] = quizState.key.split(':');
  const course = COURSE_CONTENT[slug];
  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === mId && x.l.id === lId);
  const next = allLessons[idx + 1];
  if (next) {
    currentState.moduleId = next.m.id;
    currentState.lessonId = next.l.id;
    renderSidebar();
    renderLesson();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    renderLesson();
  }
};

let flashState = null;

window.openFlashcards = (courseSlug) => {
  const cards = FLASHCARD_DATA[courseSlug];
  if (!cards || cards.length === 0) {
    document.getElementById('main-content').innerHTML = `
      <div class="flashcard-empty">
        <div class="check">📭</div>
        <h2 style="margin:0 0 8px;">Belum ada flashcard</h2>
        <p style="margin:0;">Flashcard untuk kelas ini akan segera ditambahkan.</p>
        <button class="btn-secondary" style="margin-top:20px;" onclick="renderLesson()">← Kembali ke Materi</button>
      </div>
    `;
    return;
  }
  flashState = { course: courseSlug, cards: [...cards].sort(() => Math.random() - 0.5), idx: 0, flipped: false };
  renderFlashcard();
};

function renderFlashcard() {
  const { cards, idx, flipped } = flashState;
  const card = cards[idx];
  if (!card) {
    document.getElementById('main-content').innerHTML = `
      <div class="flashcard-wrap">
        <div class="flashcard-empty">
          <div class="check">✓</div>
          <h2 style="margin:0 0 8px;">Semua kartu selesai!</h2>
          <p style="margin:0 0 20px;">Kamu sudah review ${cards.length} kartu hari ini.</p>
          <button class="btn-primary" onclick="window.restartFlashcards()">Ulang</button>
          <button class="btn-secondary" style="margin-left:8px;" onclick="renderLesson()">Kembali ke Materi</button>
        </div>
      </div>
    `;
    return;
  }
  document.getElementById('main-content').innerHTML = `
    <div class="flashcard-wrap">
      <button class="back-to-lesson-btn" onclick="renderLesson()">← Kembali ke Materi</button>
      <div class="flashcard-header">
        <span class="flashcard-category">${card.category}</span>
        <span class="flashcard-counter">${idx + 1} / ${cards.length}</span>
      </div>
      <div class="flashcard ${flipped ? 'flipped' : ''}" id="flash-card" onclick="window.flipFlashcard()">
        <div class="flashcard-inner">
          <div class="flashcard-face front">
            <div class="flashcard-text">${card.front}</div>
            <button class="pronounce-btn" onclick="event.stopPropagation(); window.speakJapanese('${card.front}', this)">🔊 Dengar</button>
            <div class="flashcard-hint">Klik kartu untuk lihat arti</div>
          </div>
          <div class="flashcard-face back">
            <div class="flashcard-reading">${card.reading}</div>
            <div class="flashcard-meaning">${card.back}</div>
          </div>
        </div>
      </div>
      <div class="flashcard-ratings">
        <button class="rating-btn hard" onclick="window.rateFlashcard('hard')">
          <span class="bar"></span><span>Sulit</span>
        </button>
        <button class="rating-btn medium" onclick="window.rateFlashcard('medium')">
          <span class="bar"></span><span>Sedang</span>
        </button>
        <button class="rating-btn easy" onclick="window.rateFlashcard('easy')">
          <span class="bar"></span><span>Mudah</span>
        </button>
      </div>
    </div>
  `;
}

window.flipFlashcard = () => {
  flashState.flipped = !flashState.flipped;
  const el = document.getElementById('flash-card');
  if (el) el.classList.toggle('flipped');
};

window.rateFlashcard = (rating) => {
  const xp = rating === 'easy' ? 2 : rating === 'medium' ? 3 : 5;
  addXP(xp, 'review kartu');
  flashState.idx++;
  flashState.flipped = false;
  renderFlashcard();
};

window.restartFlashcards = () => {
  flashState.idx = 0;
  flashState.flipped = false;
  flashState.cards = [...flashState.cards].sort(() => Math.random() - 0.5);
  renderFlashcard();
};

function handleNewEnrollment() {
  const params = new URLSearchParams(window.location.search);
  const newCourse = params.get('new');
  if (!newCourse || !COURSE_CONTENT[newCourse]) return null;

  const enrolled = getEnrolledCourses();
  if (!enrolled.includes(newCourse)) {
    enrolled.push(newCourse);
    localStorage.setItem('ez_courses', JSON.stringify(enrolled));
  }

  const banner = document.getElementById('success-banner');
  document.getElementById('new-course-name').textContent = COURSE_CONTENT[newCourse].name;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 6000);

  history.replaceState({}, '', `welcome.html?course=${newCourse}`);
  return newCourse;
}

function logout() {
  localStorage.removeItem('ez_user');
  window.location.href = 'index.html';
}

// ═══════════════════════════════════════════════
// TIME-BASED GREETING
// ═══════════════════════════════════════════════
function getTimeGreeting() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11)  return { jp: 'おはようございます', id: 'Selamat pagi',  msg: 'Mari mulai hari dengan bahasa Jepang.',         kanji: '朝', period: 'PAGI'    };
  if (h >= 11 && h < 15) return { jp: 'こんにちは',        id: 'Selamat siang', msg: 'Istirahat sejenak — luangkan waktu belajar.',    kanji: '昼', period: 'SIANG'   };
  if (h >= 15 && h < 18) return { jp: 'こんにちは',        id: 'Selamat sore',  msg: 'Sore yang baik untuk review pelajaran.',         kanji: '夕', period: 'SORE'    };
  if (h >= 18 && h < 22) return { jp: 'こんばんは',        id: 'Selamat malam', msg: 'Akhiri hari dengan progress baru.',              kanji: '夜', period: 'MALAM'   };
  return                        { jp: 'お疲れ様です',      id: 'Sudah larut',    msg: 'Jaga kesehatan ya — belajar sebentar saja.',     kanji: '深', period: 'DINI HARI' };
}

function getUserName() {
  if (!session || !session.email) return 'teman';
  const local = session.email.split('@')[0];
  const clean = local.replace(/[._-]+/g, ' ').trim();
  return clean.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function greetingBannerHtml() {
  const g = getTimeGreeting();
  const name = getUserName();
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  return `
    <div class="greeting-banner">
      <div>
        <h1 class="greeting-jp">${g.jp}、<span class="name">${name}</span><span class="san">さん</span></h1>
        <p class="greeting-id">${g.id} — ${g.msg}</p>
      </div>
      <div class="greeting-time">
        <span class="kanji">${g.kanji}</span>
        ${g.period} · ${hh}:${mm}
      </div>
    </div>
  `;
}

function refreshGreetingBanner() {
  const existing = document.querySelector('.greeting-banner');
  if (existing) existing.outerHTML = greetingBannerHtml();
}

setInterval(refreshGreetingBanner, 60 * 1000);

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderPaywall() {
  const miniPlans = Object.entries(COURSE_CONTENT).map(([slug, c]) => `
    <a href="courses/${slug}.html" class="mini-plan">
      <div class="level">${slug.toUpperCase()}</div>
      <div class="plan-name">${c.name}</div>
      <div class="plan-price">${c.price}</div>
    </a>
  `).join('');

  document.getElementById('app-root').innerHTML = `
    <main class="paywall">
      <div class="paywall-inner">
        <div class="paywall-lock">🔒</div>
        <h1>Kamu belum memiliki akses kelas</h1>
        <p>Untuk mulai belajar, pilih kelas dan selesaikan pembayaran terlebih dahulu. Sekali bayar, akses konten 1 tahun penuh.</p>
        <a href="index.html#pricing" class="paywall-cta">Pilih Kelas Sekarang →</a>

        <div class="paywall-plans">
          ${miniPlans}
        </div>
      </div>
    </main>
  `;
}

let currentState = { course: null, moduleId: null, lessonId: null };

function renderLearning(courseSlug) {
  const course = COURSE_CONTENT[courseSlug];
  if (!course) return renderPaywall();

  if (!currentState.moduleId) {
    const progress = getProgress()[courseSlug] || {};
    let found = false;
    for (const m of course.modules) {
      for (const l of m.lessons) {
        const key = `${m.id}:${l.id}`;
        if (!progress[key]) {
          currentState.moduleId = m.id;
          currentState.lessonId = l.id;
          found = true;
          break;
        }
      }
      if (found) break;
    }
    if (!found) {
      currentState.moduleId = course.modules[0].id;
      currentState.lessonId = course.modules[0].lessons[0].id;
    }
  }
  currentState.course = courseSlug;

  document.getElementById('app-root').innerHTML = `
    ${greetingBannerHtml()}
    ${renderStatsBar()}
    <div class="learning-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content" id="main-content"></main>
    </div>
  `;

  renderSidebar();
  renderLesson();
}

function renderSidebar() {
  const course = COURSE_CONTENT[currentState.course];
  const progress = getProgress()[currentState.course] || {};

  const totalLessons = course.modules.reduce((s, m) => s + m.lessons.length, 0);
  const doneLessons = Object.values(progress).filter(v => v).length;
  const pct = Math.round((doneLessons / totalLessons) * 100);

  const modulesHtml = course.modules.map(m => {
    const lessonsHtml = m.lessons.map(l => {
      const key = `${m.id}:${l.id}`;
      const isDone = !!progress[key];
      const isCurrent = m.id === currentState.moduleId && l.id === currentState.lessonId;
      const icon = l.type === 'quiz' ? '?' : (isDone ? '✓' : '▶');
      return `
        <li class="lesson-item ${isCurrent ? 'current' : ''} ${isDone ? 'done' : ''}"
            onclick="selectLesson('${m.id}', '${l.id}')">
          <span class="lesson-icon">${icon}</span>
          <span>${l.title}</span>
          <span class="lesson-meta">${l.duration}</span>
        </li>
      `;
    }).join('');

    const isOpen = m.id === currentState.moduleId;
    return `
      <div class="module ${isOpen ? 'open' : ''}" data-module="${m.id}">
        <button class="module-header" onclick="toggleModule('${m.id}')">
          <span><span class="module-num">${m.num}</span>${m.title}</span>
          <span class="caret">▶</span>
        </button>
        <ul class="lessons">${lessonsHtml}</ul>
      </div>
    `;
  }).join('');

  const flashCount = (FLASHCARD_DATA[currentState.course] || []).length;

  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-header">
      <h3>${course.name}</h3>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span>${pct}%</span>
      </div>
    </div>
    ${flashCount > 0 ? `
      <button class="flashcard-cta" onclick="openFlashcards('${currentState.course}')">
        <span class="icon">🎴</span>
        <span>Flashcard</span>
        <span class="count">${flashCount}</span>
      </button>
    ` : ''}
    ${modulesHtml}
    <div class="discord-card">
      <div class="discord-top">
        <svg class="discord-logo" viewBox="0 0 24 24" fill="white" width="18" height="18">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        <span class="discord-title">Discord Premium</span>
      </div>
      <p class="discord-desc">Komunitas eksklusif siswa aktif. Diskusi, tanya jawab, dan live session bareng sensei.</p>
      <a href="https://discord.gg/GANTI_LINK_INI" target="_blank" rel="noopener" class="discord-btn">Bergabung →</a>
    </div>
  `;
}

function renderLesson() {
  const course = COURSE_CONTENT[currentState.course];
  const module = course.modules.find(m => m.id === currentState.moduleId);
  const lesson = module.lessons.find(l => l.id === currentState.lessonId);
  const progress = getProgress()[currentState.course] || {};
  const key = `${module.id}:${lesson.id}`;
  const isDone = !!progress[key];

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === module.id && x.l.id === lesson.id);
  const prev = allLessons[idx - 1];
  const next = allLessons[idx + 1];

  // Handle interactive quiz
  if (lesson.type === 'quiz') {
    const quizKey = getQuizKey(currentState.course, module.id, lesson.id);
    const hasQuestions = !!QUIZ_DATA[quizKey];
    const scores = JSON.parse(localStorage.getItem('ez_quiz_scores') || '{}');
    const bestScore = scores[quizKey] || 0;

    document.getElementById('main-content').innerHTML = `
      <p class="lesson-breadcrumb">${course.name} · Modul <span>${module.num}</span> · KUIS</p>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${module.title} — ${lesson.duration}</p>

      <div class="quiz-container">
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:48px;margin-bottom:12px;">📝</div>
          <h2 style="font-size:22px;font-weight:800;margin:0 0 8px;">Siap untuk kuis?</h2>
          <p style="color:#485f84;margin:0 0 20px;">${lesson.body || 'Tes pemahaman kamu di bab ini.'}</p>
          ${bestScore > 0 ? `<div style="display:inline-block;padding:8px 18px;background:#fff0f2;color:#b20024;border-radius:999px;font-weight:700;font-size:13px;margin-bottom:20px;">Skor terbaik: ${bestScore}%</div><br/>` : ''}
          <button class="btn-primary" onclick="window.startQuizNow()" ${!hasQuestions ? 'disabled style="opacity:0.5"' : ''}>
            ${hasQuestions ? (bestScore > 0 ? 'Ulang Kuis →' : 'Mulai Kuis →') : 'Kuis segera hadir'}
          </button>
        </div>
      </div>

      <div class="lesson-footer" style="margin-top:20px;">
        <button class="btn-secondary" ${!prev ? 'disabled' : ''} onclick="${prev ? `selectLesson('${prev.m.id}','${prev.l.id}')` : ''}">
          ← Sebelumnya
        </button>
      </div>
    `;
    return;
  }

  // Regular lesson (video/text)
  const videoBlock = `
    <div class="video-player">
      <button class="play-btn" onclick="alert('Video player belum terintegrasi.')">▶</button>
      <span class="video-meta">${lesson.type.toUpperCase()} · ${lesson.duration.toUpperCase()}</span>
    </div>
  `;

  document.getElementById('main-content').innerHTML = `
    <p class="lesson-breadcrumb">${course.name} · Modul <span>${module.num}</span> · ${lesson.type.toUpperCase()}</p>
    <h1 class="lesson-title">${lesson.title}</h1>
    <p class="lesson-subtitle">${module.title} — ${lesson.duration}</p>

    ${videoBlock}

    <div class="lesson-body">
      <h2>Catatan Pelajaran ${lesson.jp ? `<button class="pronounce-btn" style="vertical-align:middle;font-size:11px;" onclick="window.speakLessonJP(this)">🔊 Putar Jepang</button>` : ''}</h2>
      <p>${lesson.body}</p>
      ${lesson.jp ? `<div class="jp" id="lesson-jp">${lesson.jp}</div>` : ''}
      <p style="color:#999;font-size:13px;margin-top:18px;">Materi lengkap: video tutorial, contoh audio, dan worksheet PDF tersedia saat belajar.</p>
    </div>

    <div class="lesson-footer">
      <button class="btn-secondary" ${!prev ? 'disabled' : ''} onclick="${prev ? `selectLesson('${prev.m.id}','${prev.l.id}')` : ''}">
        ← Sebelumnya
      </button>
      <button class="btn-primary" onclick="markCompleteAndNext()">
        ${isDone ? (next ? 'Lanjut →' : 'Selesai ✓') : (next ? 'Tandai Selesai & Lanjut →' : 'Tandai Selesai ✓')}
      </button>
    </div>
  `;
}

window.startQuizNow = () => {
  renderQuizLesson(document.getElementById('main-content'), currentState.course, currentState.moduleId, currentState.lessonId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.speakLessonJP = (btn) => {
  const el = document.getElementById('lesson-jp');
  if (!el) return;
  const text = el.textContent || '';
  speakJapanese(text, btn);
};

window.selectLesson = (moduleId, lessonId) => {
  currentState.moduleId = moduleId;
  currentState.lessonId = lessonId;
  renderSidebar();
  renderLesson();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.toggleModule = (moduleId) => {
  const el = document.querySelector(`.module[data-module="${moduleId}"]`);
  if (el) el.classList.toggle('open');
};

window.markCompleteAndNext = () => {
  const course = COURSE_CONTENT[currentState.course];
  const key = `${currentState.moduleId}:${currentState.lessonId}`;
  const allProgress = getProgress();
  const courseProgress = allProgress[currentState.course] || {};
  const wasAlreadyDone = !!courseProgress[key];
  courseProgress[key] = true;
  allProgress[currentState.course] = courseProgress;
  setProgress(allProgress);

  if (!wasAlreadyDone) addXP(10, 'lesson selesai');

  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({ m, l })));
  const idx = allLessons.findIndex(x => x.m.id === currentState.moduleId && x.l.id === currentState.lessonId);
  const next = allLessons[idx + 1];

  // Check if this was the last lesson of the module
  const currentModule = course.modules.find(m => m.id === currentState.moduleId);
  const moduleDoneLessons = currentModule.lessons.filter(l => courseProgress[`${currentModule.id}:${l.id}`]).length;
  const justFinishedModule = !wasAlreadyDone && moduleDoneLessons === currentModule.lessons.length;

  // Check if entire course completed
  const totalLessons = course.modules.reduce((s, m) => s + m.lessons.length, 0);
  const totalDone = Object.values(courseProgress).filter(v => v).length;
  const courseComplete = !wasAlreadyDone && totalDone === totalLessons;

  const advance = () => {
    if (next) {
      currentState.moduleId = next.m.id;
      currentState.lessonId = next.l.id;
    }
    renderSidebar();
    renderLesson();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (courseComplete) {
    showCompletion({
      title: '🎌 Selamat! Kelas Selesai',
      message: `Kamu telah menyelesaikan semua materi ${course.name}. 素晴らしい！`,
      xp: 50,
      continueLabel: 'Tutup',
      onContinue: advance,
    });
    addXP(50, 'kelas selesai');
  } else if (justFinishedModule) {
    showCompletion({
      title: 'Bab Selesai!',
      message: `Kamu sudah tamatkan "${currentModule.title}". Lanjut ke materi berikutnya?`,
      xp: 15,
      continueLabel: 'Lanjut →',
      onContinue: advance,
    });
    addXP(15, 'bab selesai');
  } else {
    advance();
  }
};

function renderCourseTabs(activeSlug) {
  const enrolled = getEnrolledCourses();
  const tabs = Object.entries(COURSE_CONTENT).map(([slug, c]) => {
    const isEnrolled = enrolled.includes(slug);
    const isActive = slug === activeSlug;
    const classes = ['course-tab'];
    if (isActive) classes.push('active');
    if (!isEnrolled) classes.push('locked');
    const lockIcon = !isEnrolled ? '<span class="lock-icon">🔒</span>' : '';
    return `<button class="${classes.join(' ')}" onclick="switchCourse('${slug}')" title="${c.name} — ${c.tagline}">${slug.toUpperCase()}${lockIcon}</button>`;
  }).join('');
  const nav = document.getElementById('course-tabs');
  if (nav) nav.innerHTML = tabs;
}

window.switchCourse = (slug) => {
  const enrolled = getEnrolledCourses();
  if (!enrolled.includes(slug)) {
    window.location.href = `courses/${slug}.html`;
    return;
  }
  if (slug === currentState.course) return;
  currentState.moduleId = null;
  currentState.lessonId = null;
  history.replaceState({}, '', `welcome.html?course=${slug}`);
  renderLearning(slug);
  renderCourseTabs(slug);
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
if (session) {
  document.getElementById('user-email').textContent = session.email;

  handleNewEnrollment();

  const enrolled = getEnrolledCourses();
  const params = new URLSearchParams(window.location.search);
  const requested = params.get('course');

  if (enrolled.length === 0) {
    renderPaywall();
  } else {
    const selected = enrolled.includes(requested) ? requested : enrolled[0];
    renderCourseTabs(selected);
    renderLearning(selected);
  }
}
</script>
