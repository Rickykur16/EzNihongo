<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Atur Ulang Kata Sandi - EzNihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth.css"/>
<style>
  .pw-hint {
    font-size: 12px;
    color: #666;
    margin: -4px 0 0;
    font-family: 'Manrope', sans-serif;
  }
  .pw-hint.ok { color: #166534; }
  .pw-hint.bad { color: #ba1a1a; }

  .invalid-token {
    display: none;
    background: #fdecec;
    border: 1px solid #ba1a1a44;
    border-radius: 10px;
    padding: 18px;
    text-align: center;
  }
  .invalid-token.show { display: block; }
  .invalid-token h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #ba1a1a; margin: 0 0 6px;
  }
  .invalid-token p {
    font-size: 13px; color: #2e3132;
    margin: 0 0 14px; line-height: 1.5;
  }
</style>
</head>
<body>

<main>
  <div style="width:100%;max-width:360px;">

    <div class="auth-header">
      <a href="index.html"><img src="logo.png" alt="EzNihongo" class="auth-logo"/></a>
      <h1 class="auth-title">Atur Ulang Kata Sandi</h1>
      <p class="auth-subtitle">Buat kata sandi baru untuk akunmu.</p>
    </div>

    <div class="auth-card">

      <div class="invalid-token" id="invalid-box">
        <h3>Tautan tidak valid</h3>
        <p>Tautan reset kata sandi tidak ditemukan atau sudah kadaluarsa. Silakan minta tautan baru.</p>
        <a href="forgot-password.html" class="auth-link">Minta tautan baru →</a>
      </div>

      <form id="reset-form" class="auth-form">
        <input id="password" type="password" placeholder="Kata sandi baru" required minlength="8" class="auth-input"/>
        <p class="pw-hint" id="pw-hint">Minimal 8 karakter.</p>
        <input id="confirm" type="password" placeholder="Konfirmasi kata sandi" required class="auth-input"/>
        <p class="auth-error" id="match-error">Kata sandi tidak cocok.</p>
        <button type="submit" class="auth-submit-btn" id="submit-btn">Simpan Kata Sandi Baru</button>
      </form>

      <p class="auth-footer-text">
        <a href="login.html" class="auth-link">Kembali ke Masuk</a>
      </p>

    </div>
  </div>
</main>

<footer>
  <p class="footer-text">© 2026 <span class="footer-brand">EzNihongo</span>.</p>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-box').classList.add('show');
  }

  const pw = document.getElementById('password');
  const confirm = document.getElementById('confirm');
  const hint = document.getElementById('pw-hint');
  const matchError = document.getElementById('match-error');

  pw.addEventListener('input', () => {
    if (pw.value.length === 0) {
      hint.textContent = 'Minimal 8 karakter.';
      hint.className = 'pw-hint';
    } else if (pw.value.length < 8) {
      hint.textContent = `Masih kurang ${8 - pw.value.length} karakter.`;
      hint.className = 'pw-hint bad';
    } else {
      hint.textContent = 'Kata sandi cukup kuat.';
      hint.className = 'pw-hint ok';
    }
  });

  confirm.addEventListener('input', () => {
    matchError.style.display = (confirm.value && confirm.value !== pw.value) ? 'block' : 'none';
  });

  document.getElementById('reset-form').addEventListener('submit', function(e) {
    e.preventDefault();
    if (pw.value !== confirm.value) {
      matchError.style.display = 'block';
      return;
    }
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Menyimpan...';
    btn.disabled = true;
    setTimeout(() => {
      window.location.href = 'login.html?reset=1';
    }, 900);
  });
</script>
</body>
</html>
