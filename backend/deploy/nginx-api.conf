# Add inside the existing `server { ... }` block for eznihongo.com
# (typically at /etc/nginx/sites-available/eznihongo)

# API reverse proxy — raise body size so /api/uploads accepts image files.
location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Admin-uploaded images can be up to 5MB (enforced by backend multer too).
    client_max_body_size 10m;

    # Pass cookies through
    proxy_pass_request_headers on;
}

# Static uploads (sensei / testimonial photos written by /api/uploads).
# Served directly by nginx — do NOT proxy through the Node app.
location /uploads/ {
    alias /var/www/eznihongo/uploads/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
}
